<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::content}, 'Thêm/Sửa Lớp học phần')}">
<body><th:block th:fragment="content">

    <div class="card" style="max-width:680px;margin:0 auto">
        <div class="card-header">
            <i class="fas fa-clipboard-list me-2"></i>
            <span th:text="${lopHocPhan.id == null ? 'Mở Lớp học phần mới' : 'Cập nhật Lớp học phần'}"></span>
        </div>
        <div class="card-body p-4">
            <form th:action="${lopHocPhan.id == null
                           ? '/admin/lop-hoc-phan/them'
                           : '/admin/lop-hoc-phan/sua/' + lopHocPhan.id}"
                  th:object="${lopHocPhan}" method="post">

                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <div class="row g-3">

                    <!-- ── Mã LHP ─────────────────────────────────────────────────────
                         FIX: Khi SỬA dùng disabled (không submit) + hidden input (giữ giá trị).
                         disabled input không bị tamper vì giá trị đến từ hidden input phía server.
                         Khi THÊM dùng input bình thường cho phép nhập.
                    -->
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">
                            Mã lớp học phần <span class="text-danger">*</span>
                        </label>

                        <!-- Chế độ SỬA: hiển thị disabled + hidden gửi giá trị thật -->
                        <th:block th:if="${lopHocPhan.id != null}">
                            <input type="text" class="form-control bg-light"
                                   th:value="*{maLhp}" disabled/>
                            <input type="hidden" th:field="*{maLhp}"/>
                            <div class="form-text text-muted">
                                <i class="fas fa-lock fa-xs me-1"></i>Mã lớp không được thay đổi sau khi tạo
                            </div>
                        </th:block>

                        <!-- Chế độ THÊM: nhập tự do -->
                        <th:block th:unless="${lopHocPhan.id != null}">
                            <input type="text" class="form-control" th:field="*{maLhp}"
                                   placeholder="VD: LTJAVA-HK1-24-01"/>
                            <div class="text-danger small mt-1" th:errors="*{maLhp}"></div>
                        </th:block>
                    </div>

                    <!-- ── Học kỳ ──────────────────────────────────────────────────── -->
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">
                            Học kỳ <span class="text-danger">*</span>
                        </label>
                        <input type="text" class="form-control" th:field="*{hocKy}"
                               placeholder="VD: HK1-2024"/>
                        <div class="text-danger small mt-1" th:errors="*{hocKy}"></div>
                    </div>

                    <!-- ── Môn học ─────────────────────────────────────────────────────
                         FIX: Thay th:field="*{monHoc.id}" bằng th:selected tường minh.
                         th:field trên nested object không tự highlight đúng option khi sửa
                         vì Thymeleaf so sánh object bằng equals(), không phải bằng id.
                    -->
                    <div class="col-12">
                        <label class="form-label fw-semibold">
                            Môn học <span class="text-danger">*</span>
                        </label>
                        <select class="form-select" name="monHoc.id">
                            <option value="">-- Chọn môn học --</option>
                            <option th:each="m : ${monHocs}"
                                    th:value="${m.id}"
                                    th:text="${m.maMon + ' - ' + m.tenMon + ' (' + m.soTinChi + ' TC)'}"
                                    th:selected="${lopHocPhan.monHoc != null
                                              and lopHocPhan.monHoc.id != null
                                              and lopHocPhan.monHoc.id == m.id}">
                            </option>
                        </select>
                        <!-- Hiển thị lỗi validation nếu có (field monHoc) -->
                        <div class="text-danger small mt-1" th:errors="*{monHoc}"></div>
                    </div>

                    <!-- ── Giảng viên ──────────────────────────────────────────────────
                         FIX: Tương tự môn học — dùng th:selected tường minh.
                    -->
                    <div class="col-12">
                        <label class="form-label fw-semibold">
                            Giảng viên <span class="text-danger">*</span>
                        </label>
                        <select class="form-select" name="giangVien.id">
                            <option value="">-- Chọn giảng viên --</option>
                            <option th:each="gv : ${giangViens}"
                                    th:value="${gv.id}"
                                    th:text="${gv.maGv + ' - ' + gv.hoTen + (gv.hocVi != null ? ' (' + gv.hocVi + ')' : '')}"
                                    th:selected="${lopHocPhan.giangVien != null
                                              and lopHocPhan.giangVien.id != null
                                              and lopHocPhan.giangVien.id == gv.id}">
                            </option>
                        </select>
                        <div class="text-danger small mt-1" th:errors="*{giangVien}"></div>
                    </div>

                    <!-- ── Sĩ số tối đa ───────────────────────────────────────────── -->
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Sĩ số tối đa</label>
                        <input type="number" class="form-control" th:field="*{siSoMax}"
                               min="1" max="200"/>
                        <div class="form-text text-muted">
                            Sĩ số hiện tại:
                            <strong th:text="${lopHocPhan.id != null ? lopHocPhan.siSoHienTai : 0}"></strong>
                            SV đã đăng ký
                        </div>
                    </div>
                    <!-- ── Thời gian mở đăng ký ──────────────────────────────────── -->
                    <!-- THOI GIAN MO -->
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">
                            <i class="fas fa-door-open me-1 text-success"></i>Thời gian mở đăng ký
                        </label>
                        <!-- SUA: dung #temporals.format thay vi th:field thuan tuy -->
                        <input type="datetime-local" class="form-control"
                               name="thoiGianMo"
                               th:value="${lopHocPhan.thoiGianMo != null ?
                      #temporals.format(lopHocPhan.thoiGianMo, 'yyyy-MM-dd''T''HH:mm') : ''}"/>
                        <div class="form-text text-muted">Để trống = mở ngay khi trạng thái là MO</div>
                    </div>

                    <!-- ── Thời gian đóng đăng ký ─────────────────────────────────── -->
                    <!-- THOI GIAN DONG -->
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">
                            <i class="fas fa-door-closed me-1 text-danger"></i>Thời gian đóng đăng ký
                        </label>
                        <input type="datetime-local" class="form-control"
                               name="thoiGianDong"
                               th:value="${lopHocPhan.thoiGianDong != null ?
                      #temporals.format(lopHocPhan.thoiGianDong, 'yyyy-MM-dd''T''HH:mm') : ''}"/>
                        <div class="form-text text-muted">Để trống = không tự đóng</div>
                    </div>
                    <!-- ── Trạng thái ─────────────────────────────────────────────── -->
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Trạng thái</label>
                        <select class="form-select" th:field="*{trangThai}">
                            <option th:each="tt : ${trangThais}"
                                    th:value="${tt}"
                                    th:text="${tt}">
                            </option>
                        </select>
                    </div>

                    <!-- ── Buttons ────────────────────────────────────────────────── -->
                    <div class="col-12 d-flex gap-2 justify-content-end mt-2 border-top pt-3">
                        <a th:href="@{/admin/lop-hoc-phan}" class="btn btn-secondary">
                            <i class="fas fa-arrow-left me-1"></i>Quay lại
                        </a>
                        <button type="submit" class="btn btn-danger">
                            <i class="fas fa-save me-1"></i>
                            <span th:text="${lopHocPhan.id == null ? 'Mở lớp' : 'Cập nhật'}"></span>
                        </button>
                    </div>

                </div>
            </form>
        </div>
    </div>

</th:block></body></html>
