<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: layout(~{::content}, 'Thêm/Sửa Lớp học phần')}">
<body><th:block th:fragment="content">
<div class="card" style="max-width:680px;margin:0 auto">
  <div class="card-header">
    <i class="fas fa-clipboard-list me-2"></i>
    <span th:text="${lopHocPhan.id==null?'Mở Lớp học phần mới':'Cập nhật Lớp học phần'}"></span>
  </div>
  <div class="card-body p-4">
    <form th:action="${lopHocPhan.id==null?'/admin/lop-hoc-phan/them':'/admin/lop-hoc-phan/sua/'+lopHocPhan.id}"
          th:object="${lopHocPhan}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label fw-semibold">Mã lớp học phần <span class="text-danger">*</span></label>
          <input type="text" class="form-control" th:field="*{maLhp}"
                 th:readonly="${lopHocPhan.id!=null}" placeholder="VD: LTJAVA-HK1-24-01"/>
          <div class="text-danger small mt-1" th:errors="*{maLhp}"></div>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-semibold">Học kỳ <span class="text-danger">*</span></label>
          <input type="text" class="form-control" th:field="*{hocKy}" placeholder="VD: HK1-2024"/>
          <div class="text-danger small mt-1" th:errors="*{hocKy}"></div>
        </div>
        <div class="col-12">
          <label class="form-label fw-semibold">Môn học <span class="text-danger">*</span></label>
            <select class="form-select" th:field="*{monHoc.id}" th:if="${lopHocPhan.monHoc != null}">
            <option value="">-- Chọn môn học --</option>
            <option th:each="m:${monHocs}" th:value="${m.id}"
                    th:text="${m.maMon+' - '+m.tenMon+' ('+m.soTinChi+' TC)'}"></option>
          </select>
          <div class="text-danger small mt-1" th:errors="*{monHoc}"></div>
        </div>
        <div class="col-12">
          <label class="form-label fw-semibold">Giảng viên <span class="text-danger">*</span></label>
            <select class="form-select" th:field="*{giangVien.id}" th:if="${lopHocPhan.giangVien != null}">
            <option value="">-- Chọn giảng viên --</option>
            <option th:each="gv:${giangViens}" th:value="${gv.id}"
                    th:text="${gv.maGv+' - '+gv.hoTen+(gv.hocVi!=null?' ('+gv.hocVi+')'  :'')}"></option>
          </select>
          <div class="text-danger small mt-1" th:errors="*{giangVien}"></div>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-semibold">Sĩ số tối đa</label>
          <input type="number" class="form-control" th:field="*{siSoMax}" min="1" max="200"/>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-semibold">Trạng thái</label>
          <select class="form-select" th:field="*{trangThai}">
            <option th:each="tt:${trangThais}" th:value="${tt}" th:text="${tt}"></option>
          </select>
        </div>
        <div class="col-12 d-flex gap-2 justify-content-end mt-2 border-top pt-3">
          <a th:href="@{/admin/lop-hoc-phan}" class="btn btn-secondary">
            <i class="fas fa-arrow-left me-1"></i>Quay lại</a>
          <button type="submit" class="btn btn-danger">
            <i class="fas fa-save me-1"></i>
            <span th:text="${lopHocPhan.id==null?'Mở lớp':'Cập nhật'}"></span>
          </button>
        </div>
      </div>
    </form>
  </div>
</div>
</th:block></body></html>
