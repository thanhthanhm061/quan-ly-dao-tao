<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: layout(~{::content}, 'Quản lý Lớp học phần')}">
<body><th:block th:fragment="content">
<div class="card">
  <div class="card-header d-flex justify-content-between align-items-center">
    <span><i class="fas fa-clipboard-list me-2"></i>Danh sách Lớp học phần</span>
    <a th:href="@{/admin/lop-hoc-phan/them}" class="btn btn-danger btn-sm"><i class="fas fa-plus me-1"></i>Mở lớp mới</a>
  </div>
  <div class="card-body">
    <!-- Lọc theo học kỳ -->
    <form method="get" class="d-flex gap-2 mb-3 align-items-center">
      <label class="fw-semibold me-1">Học kỳ:</label>
      <select name="hocKy" class="form-select" style="width:180px" onchange="this.form.submit()">
        <option value="">-- Tất cả --</option>
        <option th:each="hk:${danhSachHocKy}" th:value="${hk}" th:text="${hk}"
                th:selected="${hk==hocKyChon}"></option>
      </select>
      <a th:href="@{/admin/lop-hoc-phan}" class="btn btn-outline-secondary btn-sm">Reset</a>
    </form>
    <div class="table-responsive">
      <table class="table table-hover align-middle">
        <thead><tr>
          <th>#</th><th>Mã LHP</th><th>Môn học</th><th>Giảng viên</th>
          <th>Học kỳ</th><th>Sĩ số</th><th>Trạng thái</th><th>Thao tác</th>
        </tr></thead>
        <tbody>
          <tr th:if="${#lists.isEmpty(lopHocPhans)}">
            <td colspan="8" class="text-center text-muted py-4"><i class="fas fa-inbox fa-2x d-block mb-2"></i>Không có dữ liệu</td>
          </tr>
          <tr th:each="lhp,i : ${lopHocPhans}">
            <td th:text="${i.count}"></td>
            <td><code th:text="${lhp.maLhp}"></code></td>
            <td class="fw-semibold small" th:text="${lhp.monHoc.tenMon}"></td>
            <td class="small" th:text="${lhp.giangVien.hoTen}"></td>
            <td><span class="badge bg-info text-dark" th:text="${lhp.hocKy}"></span></td>
            <td>
              <span th:text="${lhp.siSoHienTai+'/'+lhp.siSoMax}"></span>
              <div class="progress mt-1" style="height:3px">
                <div class="progress-bar"
                     th:classappend="${lhp.conCho ? 'bg-success' : 'bg-danger'}"
                     th:style="'width:'+${lhp.siSoMax > 0 ? lhp.siSoHienTai*100/lhp.siSoMax : 0}+'%'"></div>
              </div>
            </td>
            <td>
              <span class="badge"
                    th:classappend="${lhp.trangThai.name()=='MO'?'bg-success':lhp.trangThai.name()=='DONG'?'bg-warning':'bg-danger'}"
                    th:text="${lhp.trangThai}"></span>
            </td>
            <td class="d-flex gap-1 flex-wrap">
              <a th:href="@{/admin/lop-hoc-phan/{id}/danh-sach(id=${lhp.id})}"
                 class="btn btn-sm btn-outline-primary" title="Danh sách SV">
                <i class="fas fa-users"></i></a>
              <a th:href="@{/admin/lop-hoc-phan/sua/{id}(id=${lhp.id})}"
                 class="btn btn-sm btn-outline-warning" title="Sửa"><i class="fas fa-edit"></i></a>
              <form th:action="@{/admin/lop-hoc-phan/xoa/{id}(id=${lhp.id})}" method="post" class="d-inline"
                    onsubmit="return confirm('Xác nhận xóa lớp học phần này?')">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button class="btn btn-sm btn-outline-danger" title="Xóa"><i class="fas fa-trash"></i></button>
              </form>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
</th:block></body></html>
