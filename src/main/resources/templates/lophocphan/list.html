<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::content}, 'Quản lý Lớp học phần')}">

<body>
<th:block th:fragment="content">

    <style>
        .card{
            border:none;
            border-radius:16px;
            overflow:hidden;
            box-shadow:0 6px 18px rgba(15,23,42,.06);
        }

        .card-header{
            background:linear-gradient(135deg,#1e3a8a,#2563eb);
            color:#fff;
            padding:16px 20px;
            border:none;
        }

        .card-header span{
            font-size:16px;
            font-weight:700;
        }

        .btn-add{
            background:#fff;
            color:#2563eb !important;
            border:none;
            border-radius:10px;
            font-weight:600;
            padding:8px 14px;
        }

        .btn-add:hover{
            background:#eff6ff;
        }

        .toolbar{
            display:flex;
            justify-content:space-between;
            align-items:center;
            flex-wrap:wrap;
            gap:12px;
            margin-bottom:16px;
        }

        .search-box{
            position:relative;
            width:360px;
            margin-left:auto;
        }

        .search-icon{
            position:absolute;
            left:14px;
            top:50%;
            transform:translateY(-50%);
            color:#94a3b8;
            font-size:14px;
        }

        .search-input{
            padding-left:40px;
            border-radius:12px;
            border:1px solid #e2e8f0;
            height:42px;
        }

        .search-input:focus{
            border-color:#2563eb;
            box-shadow:0 0 0 3px rgba(37,99,235,.12);
        }

        .table td{
            vertical-align:middle;
        }

        .action-buttons{
            display:flex;
            gap:6px;
            flex-wrap:wrap;
        }

        /* modal delete */
        .delete-modal .modal-dialog{
            max-width:360px;
        }

        .delete-modal .modal-content{
            border:none;
            border-radius:16px;
            overflow:hidden;
            box-shadow:0 10px 28px rgba(0,0,0,.14);
        }

        .delete-header{
            background:linear-gradient(135deg,#dc2626,#ef4444);
            padding:14px 16px 12px;
            text-align:center;
            color:#fff;
        }

        .delete-icon{
            width:46px;
            height:46px;
            border-radius:50%;
            background:rgba(255,255,255,.18);
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:1.15rem;
            margin:auto auto 8px;
        }

        .delete-header h5{
            font-weight:700;
            margin:0;
            font-size:17px;
        }

        .delete-sub{
            font-size:12px;
            opacity:.9;
            margin-top:2px;
        }

        .delete-body{
            padding:16px 16px 8px;
            text-align:center;
        }

        .delete-body p{
            color:#64748b;
            font-size:13px;
            margin-bottom:14px;
        }

        .delete-info{
            background:#f8fafc;
            border:1px solid #e2e8f0;
            border-radius:12px;
            padding:10px 12px;
            text-align:left;
        }

        .delete-info-item{
            display:flex;
            justify-content:space-between;
            padding:4px 0;
            font-size:13px;
        }

        .delete-info-label{
            color:#64748b;
            font-weight:600;
        }

        .delete-info-value{
            font-weight:600;
            color:#0f172a;
            max-width:180px;
            text-align:right;
        }

        .delete-info code{
            background:#fee2e2;
            color:#dc2626;
            padding:2px 6px;
            border-radius:6px;
            font-size:11px;
        }

        .modal-footer{
            border:none;
            padding:14px 16px 16px;
            gap:8px;
        }

        .btn-cancel{
            flex:1;
            border-radius:10px;
            font-weight:600;
            padding:8px;
            font-size:13px;
        }

        .btn-delete-confirm{
            flex:1;
            border:none;
            border-radius:10px;
            background:linear-gradient(135deg,#dc2626,#ef4444);
            color:#fff;
            font-weight:600;
            padding:8px;
            font-size:13px;
        }
    </style>

    <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
            <span>
                <i class="fas fa-clipboard-list me-2"></i>Danh sách Lớp học phần
            </span>

            <a th:href="@{/admin/lop-hoc-phan/them}" class="btn btn-add btn-sm">
                <i class="fas fa-plus me-1"></i>Mở lớp mới
            </a>
        </div>

        <div class="card-body">

            <div class="toolbar">
                <form method="get" class="d-flex gap-2 align-items-center">
                    <label class="fw-semibold">Học kỳ:</label>

                    <select name="hocKy"
                            class="form-select"
                            style="width:180px"
                            onchange="this.form.submit()">
                        <option value="">-- Tất cả --</option>
                        <option th:each="hk:${danhSachHocKy}"
                                th:value="${hk}"
                                th:text="${hk}"
                                th:selected="${hk==hocKyChon}">
                        </option>
                    </select>

                    <a th:href="@{/admin/lop-hoc-phan}"
                       class="btn btn-outline-secondary btn-sm">
                        Reset
                    </a>
                </form>

                <div class="search-box">
                    <i class="fas fa-search search-icon"></i>
                    <input type="text"
                           id="searchInput"
                           class="form-control search-input"
                           placeholder="Tìm kiếm...">
                </div>
            </div>

            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead>
                    <tr>
                        <th>#</th>
                        <th>Mã LHP</th>
                        <th>Môn học</th>
                        <th>Giảng viên</th>
                        <th>Học kỳ</th>
                        <th>Sĩ số</th>
                        <th>Trạng thái</th>
                        <th>Thao tác</th>
                    </tr>
                    </thead>

                    <tbody>
                    <tr th:if="${#lists.isEmpty(lopHocPhans)}">
                        <td colspan="8" class="text-center text-muted py-4">
                            <i class="fas fa-inbox fa-2x d-block mb-2"></i>
                            Không có dữ liệu
                        </td>
                    </tr>

                    <tr th:each="lhp,i : ${lopHocPhans}">
                        <td th:text="${i.count}"></td>
                        <td><code th:text="${lhp.maLhp}"></code></td>
                        <td th:text="${lhp.monHoc.tenMon}"></td>
                        <td th:text="${lhp.giangVien.hoTen}"></td>

                        <td>
                            <span class="badge bg-info text-dark"
                                  th:text="${lhp.hocKy}">
                            </span>
                        </td>

                        <td th:text="${lhp.siSoHienTai + (lhp.siSoMax > 0 ? '/' + lhp.siSoMax : '/∞')}"></td>

                        <td>
                            <span class="badge"
                                  th:classappend="${lhp.trangThai.name()=='MO'?'bg-success':lhp.trangThai.name()=='DONG'?'bg-warning':'bg-danger'}"
                                  th:text="${lhp.trangThai}">
                            </span>
                        </td>

                        <td>
                            <div class="action-buttons">
                                <a th:href="@{/admin/lop-hoc-phan/{id}/danh-sach(id=${lhp.id})}"
                                   class="btn btn-sm btn-outline-primary">
                                    <i class="fas fa-users"></i>
                                </a>

                                <a th:href="@{/admin/lop-hoc-phan/sua/{id}(id=${lhp.id})}"
                                   class="btn btn-sm btn-outline-warning">
                                    <i class="fas fa-edit"></i>
                                </a>

                                <button type="button"
                                        class="btn btn-sm btn-outline-danger"
                                        data-bs-toggle="modal"
                                        data-bs-target="#deleteModal"
                                        th:attr="
                                            data-id=${lhp.id},
                                            data-malhp=${lhp.maLhp},
                                            data-monhoc=${lhp.monHoc.tenMon},
                                            data-giangvien=${lhp.giangVien.hoTen},
                                            data-hocky=${lhp.hocKy}">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- modal delete -->
    <div class="modal fade delete-modal" id="deleteModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">

                <div class="delete-header">
                    <div class="delete-icon">
                        <i class="fas fa-trash-alt"></i>
                    </div>
                    <h5>Xóa lớp học phần</h5>
                    <div class="delete-sub">Hành động này không thể hoàn tác</div>
                </div>

                <div class="delete-body">
                    <p>Bạn có chắc muốn xóa lớp học phần này?</p>

                    <div class="delete-info">
                        <div class="delete-info-item">
                            <span class="delete-info-label">Mã lớp</span>
                            <span class="delete-info-value"><code id="deleteMaLhp"></code></span>
                        </div>

                        <div class="delete-info-item">
                            <span class="delete-info-label">Môn học</span>
                            <span class="delete-info-value" id="deleteMonHoc"></span>
                        </div>

                        <div class="delete-info-item">
                            <span class="delete-info-label">Giảng viên</span>
                            <span class="delete-info-value" id="deleteGiangVien"></span>
                        </div>

                        <div class="delete-info-item">
                            <span class="delete-info-label">Học kỳ</span>
                            <span class="delete-info-value" id="deleteHocKy"></span>
                        </div>
                    </div>
                </div>

                <div class="modal-footer">
                    <button type="button"
                            class="btn btn-light btn-cancel"
                            data-bs-dismiss="modal">
                        Hủy
                    </button>

                    <form id="deleteForm" method="post" class="flex-fill">
                        <input type="hidden"
                               th:name="${_csrf.parameterName}"
                               th:value="${_csrf.token}"/>

                        <button type="submit" class="btn btn-delete-confirm w-100">
                            <i class="fas fa-trash me-1"></i>Xóa
                        </button>
                    </form>
                </div>

            </div>
        </div>
    </div>

    <script>
        const deleteModal = document.getElementById('deleteModal');

        deleteModal.addEventListener('show.bs.modal', function (event) {
            const button = event.relatedTarget;

            const id        = button.getAttribute('data-id');
            const maLhp     = button.getAttribute('data-malhp');
            const monHoc    = button.getAttribute('data-monhoc');
            const giangVien = button.getAttribute('data-giangvien');
            const hocKy     = button.getAttribute('data-hocky');

            const shortText = (text, max = 32) => {
                if (!text) return '';
                return text.length > max ? text.substring(0, max) + '...' : text;
            };

            document.getElementById('deleteMaLhp').textContent = maLhp;
            document.getElementById('deleteMonHoc').textContent = shortText(monHoc, 35);
            document.getElementById('deleteGiangVien').textContent = shortText(giangVien, 28);
            document.getElementById('deleteHocKy').textContent = hocKy;

            document.getElementById('deleteMonHoc').title = monHoc;
            document.getElementById('deleteGiangVien').title = giangVien;

            document.getElementById('deleteForm').action =
                '/admin/lop-hoc-phan/xoa/' + id;
        });

        /* SEARCH REALTIME: CHỈ THEO MÃ LHP + HỌC KỲ */
        document.getElementById('searchInput').addEventListener('keyup', function () {
            const keyword = this.value.trim().toLowerCase();
            const rows = document.querySelectorAll('tbody tr');
            let hasResult = false;

            rows.forEach(row => {
                if (row.id === 'noResultRow' || row.querySelector('td[colspan]')) return;

                const cells = row.querySelectorAll('td');

                // cột:
                // 1 = mã LHP
                // 4 = học kỳ
                const maLhp = cells[1]?.innerText.toLowerCase() || '';
                const hocKy = cells[4]?.innerText.toLowerCase() || '';

                if (maLhp.includes(keyword) || hocKy.includes(keyword)) {
                    row.style.display = '';
                    hasResult = true;
                } else {
                    row.style.display = 'none';
                }
            });

            let emptyRow = document.getElementById('noResultRow');

            if (!hasResult && keyword !== '') {
                if (!emptyRow) {
                    emptyRow = document.createElement('tr');
                    emptyRow.id = 'noResultRow';
                    emptyRow.innerHTML = `
                        <td colspan="8" class="text-center text-muted py-4">
                            <i class="fas fa-search-minus fa-2x d-block mb-2 opacity-50"></i>
                            Không tìm thấy lớp học phần phù hợp
                        </td>
                    `;
                    document.querySelector('tbody').appendChild(emptyRow);
                }
            } else {
                if (emptyRow) emptyRow.remove();
            }
        });
    </script>

</th:block>
</body>
</html>
