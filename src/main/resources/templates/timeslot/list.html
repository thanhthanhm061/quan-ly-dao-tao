<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::content}, 'Quản lý ca học')}">
<body><th:block th:fragment="content">
    <style>
        .delete-toast{
            position:fixed;
            top:25px;
            left:50%;
            transform:translateX(-50%) translateY(-20px);
            width:340px;
            background:#fff;
            border-radius:16px;
            box-shadow:0 14px 40px rgba(0,0,0,.18);
            border:1px solid #fee2e2;
            z-index:9999;
            opacity:0;
            pointer-events:none;
            transition:.25s;
        }

        .delete-toast.show{
            opacity:1;
            pointer-events:auto;
            transform:translateX(-50%) translateY(0);
        }

        .delete-toast-header{
            background:linear-gradient(135deg,#dc2626,#ef4444);
            color:white;
            padding:14px 16px;
            font-weight:700;
            display:flex;
            align-items:center;
            gap:8px;
            border-radius:16px 16px 0 0;
        }

        .delete-toast-body{
            padding:16px;
        }

        .delete-info{
            background:#f8fafc;
            border:1px solid #e2e8f0;
            border-radius:12px;
            padding:10px 12px;
            font-size:.85rem;
            color:#475569;
            line-height:1.8;
        }

        .delete-actions{
            display:flex;
            justify-content:flex-end;
            gap:8px;
            margin-top:14px;
        }

        .btn-cancel{
            border:1px solid #e2e8f0;
            background:white;
            padding:7px 14px;
            border-radius:10px;
            font-weight:600;
        }

        .btn-confirm{
            border:none;
            background:linear-gradient(135deg,#dc2626,#ef4444);
            color:white;
            padding:7px 14px;
            border-radius:10px;
            font-weight:600;
        }
    </style>
    <div class="card" style="border:none;border-radius:18px;box-shadow:0 8px 24px rgba(0,0,0,.07)">

        <div class="card-header d-flex justify-content-between align-items-center"
             style="background:linear-gradient(135deg,#1e3a8a,#2563eb);color:white;border-radius:18px 18px 0 0;padding:18px 24px">
        <span style="font-size:18px;font-weight:700">
            <i class="fas fa-clock me-2"></i>Danh sách ca học
        </span>
            <a th:href="@{/admin/time-slots/them}" class="btn btn-light btn-sm fw-semibold text-primary">
                <i class="fas fa-plus me-1"></i>Thêm ca học
            </a>
        </div>

        <div class="card-body p-0">
            <table class="table table-hover mb-0 align-middle">
                <thead style="background:#f8fafc">
                <tr>
                    <th style="padding:16px">Tiết</th>
                    <th>Tên ca</th>
                    <th>Giờ bắt đầu</th>
                    <th>Giờ kết thúc</th>
                    <th>Trạng thái</th>
                    <th class="text-center">Thao tác</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(timeSlots)}">
                    <td colspan="6" class="text-center py-5 text-muted">
                        <i class="fas fa-clock fa-3x mb-3 d-block" style="opacity:.2"></i>
                        Chưa có ca học nào
                    </td>
                </tr>
                <tr th:each="ts : ${timeSlots}">
                    <td>
                    <span class="badge"
                          style="background:#dbeafe;color:#1e40af;padding:6px 12px;border-radius:20px;font-weight:700"
                          th:text="'Tiết ' + ${ts.tietSo}"></span>
                    </td>
                    <td class="fw-semibold" th:text="${ts.tenCa ?: '-'}"></td>
                    <td>
                    <span style="color:#059669;font-weight:600"
                          th:text="${ts.gioBatDau}"></span>
                    </td>
                    <td>
                    <span style="color:#dc2626;font-weight:600"
                          th:text="${ts.gioKetThuc}"></span>
                    </td>
                    <td>
                    <span class="badge"
                          th:classappend="${ts.active ? 'bg-success' : 'bg-secondary'}"
                          th:text="${ts.active ? 'Đang dùng' : 'Tắt'}"></span>
                    </td>
                    <td class="text-center">
                        <a th:href="@{/admin/time-slots/sua/{id}(id=${ts.id})}"
                           class="btn btn-sm btn-outline-warning me-1">
                            <i class="fas fa-edit"></i>
                        </a>
                        <form th:action="@{/admin/time-slots/xoa/{id}(id=${ts.id})}"
                              method="post"
                              class="d-inline delete-form">

                            <input type="hidden"
                                   th:name="${_csrf.parameterName}"
                                   th:value="${_csrf.token}"/>

                            <button type="button"
                                    class="btn btn-sm btn-outline-danger btn-delete-slot"
                                    th:attr="
                                        data-tiet=${ts.tietSo},
                                        data-tenca=${ts.tenCa}
                                    ">
                                <i class="fas fa-trash"></i>
                            </button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
    <!-- Toast xác nhận xóa -->
    <div class="delete-toast" id="deleteToast">

        <div class="delete-toast-header">
            <i class="fas fa-trash-alt"></i>
            <span>Xác nhận xóa</span>
        </div>

        <div class="delete-toast-body">
            <p class="mb-2 fw-semibold">Bạn muốn xóa ca học này?</p>

            <div class="delete-info">
                <div><strong>Tiết:</strong> <span id="toastTiet"></span></div>
                <div><strong>Tên ca:</strong> <span id="toastTenCa"></span></div>
            </div>

            <div class="delete-actions">
                <button type="button" class="btn-cancel" id="btnCancelDelete">
                    Hủy
                </button>

                <button type="button" class="btn-confirm" id="btnConfirmDelete">
                    <i class="fas fa-trash me-1"></i>Xóa
                </button>
            </div>
        </div>

    </div>
    <script>
    (function () {

        const toast = document.getElementById('deleteToast');
        const btnCancel = document.getElementById('btnCancelDelete');
        const btnConfirm = document.getElementById('btnConfirmDelete');

        let currentForm = null;

        document.querySelectorAll('.btn-delete-slot').forEach(btn => {
            btn.addEventListener('click', function () {

                currentForm = this.closest('form');

                document.getElementById('toastTiet').textContent =
                    'Tiết ' + (this.dataset.tiet || '-');

                document.getElementById('toastTenCa').textContent =
                    this.dataset.tenca || '-';

                toast.classList.add('show');
            });
        });

        btnCancel.addEventListener('click', function () {
            toast.classList.remove('show');
        });

        btnConfirm.addEventListener('click', function () {
            toast.classList.remove('show');
            if (currentForm) currentForm.submit();
        });

        document.addEventListener('click', function (e) {
            if (
                toast.classList.contains('show') &&
                !toast.contains(e.target) &&
                !e.target.closest('.btn-delete-slot')
            ) {
                toast.classList.remove('show');
            }
        });

    })();
</script>
</th:block>
</body></html>
