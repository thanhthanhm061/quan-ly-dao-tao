<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: layout(~{::content}, 'Thêm/Sửa Sinh viên')}">
<body><th:block th:fragment="content">
<div class="card" style="max-width:720px;margin:0 auto">
  <div class="card-header">
    <i class="fas fa-user-graduate me-2"></i>
    <span th:text="${sinhVien.id==null?'Thêm Sinh viên mới':'Cập nhật Sinh viên'}"></span>
  </div>
  <div class="card-body p-4">
    <form th:action="${sinhVien.id==null?'/admin/sinh-vien/them':'/admin/sinh-vien/sua/'+sinhVien.id}"
          th:object="${sinhVien}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label fw-semibold">Mã sinh viên <span class="text-danger">*</span></label>
          <input type="text" class="form-control" th:field="*{maSv}"
                 th:readonly="${sinhVien.id!=null}" placeholder="VD: SV001"/>
          <div class="text-danger small mt-1" th:errors="*{maSv}"></div>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-semibold">Họ và tên <span class="text-danger">*</span></label>
          <input type="text" class="form-control" th:field="*{hoTen}" placeholder="Nguyễn Văn A"/>
          <div class="text-danger small mt-1" th:errors="*{hoTen}"></div>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-semibold">Ngày sinh</label>
          <input type="date" class="form-control" th:field="*{ngaySinh}"/>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-semibold">Giới tính</label>
            <select class="form-select" th:field="*{gioiTinh}">
                <option value="">-- Chọn giới tính --</option>
<!--                <option th:each="gt : ${T(com.qldt.model.enums.GioiTinh).values()}"-->
<!--                        th:value="${gt}"-->
<!--                        th:text="${gt}">-->
            </select>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-semibold">Email</label>
          <input type="email" class="form-control" th:field="*{email}" placeholder="email@example.com"/>
          <div class="text-danger small mt-1" th:errors="*{email}"></div>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-semibold">Số điện thoại</label>
          <input type="text" class="form-control" th:field="*{soDienThoai}" placeholder="0901234567"/>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-semibold">Lớp</label>
            <select class="form-select" th:field="*{lop.id}">
                <option value="">-- Chọn lớp --</option>
                <option th:each="l : ${lops}"
                        th:value="${l.id}"
                        th:text="${l.tenLop}">
                </option>
            </select>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-semibold">Trạng thái</label>
            <select class="form-select" th:field="*{trangThai}">
                <option value="">-- Chọn trạng thái --</option>
                <option th:each="tt : ${T(com.qldt.model.enums.TrangThaiSV).values()}"
                        th:value="${tt}"
                        th:text="${tt}">
                </option>
            </select>
        </div>
        <div class="col-12">
          <label class="form-label fw-semibold">Địa chỉ</label>
          <input type="text" class="form-control" th:field="*{diaChi}" placeholder="Số nhà, đường, quận, thành phố"/>
        </div>
        <div class="col-12 d-flex gap-2 justify-content-end mt-2 border-top pt-3">
          <a th:href="@{/admin/sinh-vien}" class="btn btn-secondary">
            <i class="fas fa-arrow-left me-1"></i>Quay lại</a>
          <button type="submit" class="btn btn-primary">
            <i class="fas fa-save me-1"></i>
            <span th:text="${sinhVien.id==null?'Thêm mới':'Cập nhật'}"></span>
          </button>
        </div>
      </div>
    </form>
  </div>
</div>
</th:block></body></html>
