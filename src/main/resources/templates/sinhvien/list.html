<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::content}, 'Quản lý Sinh viên')}">

<body>

<th:block th:fragment="content">

    <!-- SWEET ALERT -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>

        body{
            background:#f1f5f9;
        }

        /* CARD */
        .student-card{
            border:none;
            border-radius:24px;
            overflow:hidden;
            background:#fff;
            box-shadow:0 10px 35px rgba(0,0,0,0.07);
        }

        /* HEADER */
        .student-header{
            background:linear-gradient(135deg,#1e3a8a,#2563eb);
            color:white;
            padding:22px 28px;
        }

        .student-title{
            font-size:24px;
            font-weight:700;
            display:flex;
            align-items:center;
            gap:12px;
        }

        .student-header .badge{
            font-size:13px;
            padding:7px 12px;
            border-radius:30px;
        }

        /* SEARCH */
        .search-wrapper{
            display:flex;
            justify-content:flex-end;
            margin-bottom:22px;
        }

        .search-form{
            position:relative;
            width:320px;
        }

        .search-input{
            width:100%;
            height:46px;
            border:none;
            border-radius:14px;
            background:#f8fafc;
            padding:0 48px 0 18px;
            font-size:14px;
            transition:0.25s;
            border:1px solid #e2e8f0;
        }

        .search-input:focus{
            outline:none;
            background:#fff;
            border-color:#2563eb;
            box-shadow:0 0 0 4px rgba(37,99,235,0.08);
        }

        .search-icon{
            position:absolute;
            top:50%;
            right:16px;
            transform:translateY(-50%);
            color:#64748b;
        }

        /* TABLE */
        .table-responsive{
            border-radius:18px;
            overflow:hidden;
        }

        .table{
            margin-bottom:0;
        }

        .table thead{
            background:#f8fafc;
        }

        .table thead th{
            border:none;
            color:#334155;
            font-size:14px;
            font-weight:700;
            padding:18px 16px;
            white-space:nowrap;
        }

        .table tbody td{
            padding:18px 16px;
            vertical-align:middle;
            border-color:#f1f5f9;
        }

        .table-hover tbody tr{
            transition:.25s;
        }

        .table-hover tbody tr:hover{
            background:#f8fbff;
        }

        /* BADGE */
        .status-badge{
            padding:7px 12px;
            border-radius:30px;
            font-size:12px;
            font-weight:600;
        }

        /* ACTION BUTTON */
        .action-group{
            display:flex;
            justify-content:center;
            gap:8px;
        }

        .action-btn{
            width:38px;
            height:38px;
            display:flex;
            align-items:center;
            justify-content:center;
            border-radius:12px;
            transition:all .25s ease;
        }

        .action-btn:hover{
            transform:translateY(-2px);
        }

        /* EMPTY */
        .empty-box{
            padding:60px 0;
        }

        .empty-box i{
            color:#cbd5e1;
        }

        .empty-title{
            font-size:18px;
            font-weight:700;
            color:#334155;
        }

        .empty-desc{
            color:#94a3b8;
            margin-top:5px;
        }

        /* CODE */
        code{
            background:#eff6ff;
            color:#1d4ed8;
            padding:6px 10px;
            border-radius:8px;
            font-size:13px;
        }

        /* SWEET ALERT */
        .swal2-popup{
            border-radius:24px !important;
        }

        .swal2-title{
            font-size:24px !important;
            font-weight:700 !important;
            color:#0f172a !important;
        }

        .swal2-html-container{
            font-size:15px !important;
            color:#475569 !important;
        }

        .delete-info{
            margin-top:16px;
            background:#f8fafc;
            border-radius:16px;
            padding:16px;
            text-align:left;
            border:1px solid #e2e8f0;
        }

        .delete-row{
            display:flex;
            justify-content:space-between;
            margin-bottom:10px;
        }

        .delete-row:last-child{
            margin-bottom:0;
        }

        .delete-label{
            font-weight:600;
            color:#64748b;
        }

        .delete-value{
            font-weight:700;
            color:#0f172a;
        }

        @media(max-width:768px){

            .student-header{
                flex-direction:column;
                gap:15px;
                align-items:flex-start !important;
            }

            .search-wrapper{
                justify-content:center;
            }

            .search-form{
                width:100%;
            }

        }

    </style>

    <div class="card student-card">

        <!-- HEADER -->
        <div class="student-header d-flex justify-content-between align-items-center">

            <div class="student-title">

                <i class="fas fa-user-graduate"></i>

                <span>Danh sách Sinh viên</span>

                <span class="badge bg-light text-primary"
                      th:text="${tongSo}">
                    0
                </span>

            </div>

            <a th:href="@{/admin/sinh-vien/them}"
               class="btn btn-light text-primary fw-semibold">

                <i class="fas fa-plus me-1"></i>
                Thêm mới

            </a>

        </div>

        <!-- BODY -->
        <div class="card-body p-4">

            <!-- SEARCH -->
            <div class="search-wrapper">

                <form method="get"
                      class="search-form">

                    <input type="text"
                           id="searchInput"
                           name="search"
                           class="search-input"
                           placeholder="Tìm kiếm sinh viên..."
                           th:value="${search}"/>

                    <i class="fas fa-search search-icon"></i>

                </form>

            </div>

            <!-- TABLE -->
            <div class="table-responsive">

                <table class="table table-hover align-middle">

                    <thead>

                    <tr>

                        <th>#</th>
                        <th>Mã SV</th>
                        <th>Họ tên</th>
                        <th>Giới tính</th>
                        <th>Lớp</th>
                        <th>Email</th>
                        <th>Trạng thái</th>
                        <th class="text-center">Thao tác</th>

                    </tr>

                    </thead>

                    <tbody id="studentTableBody">

                    <!-- EMPTY -->
                    <tr th:if="${#lists.isEmpty(sinhViens)}"
                        id="emptyRow">

                        <td colspan="8"
                            class="text-center empty-box">

                            <i class="fas fa-user-slash fa-4x mb-3 d-block"></i>

                            <div class="empty-title">
                                Không có sinh viên
                            </div>

                            <div class="empty-desc">
                                Không tìm thấy dữ liệu phù hợp
                            </div>

                        </td>

                    </tr>

                    <!-- DATA -->
                    <tr th:each="sv,i : ${sinhViens}"
                        class="student-row">

                        <td th:text="${i.count}"></td>

                        <td>

                            <code th:text="${sv.maSv}"></code>

                        </td>

                        <td class="fw-semibold student-name"
                            th:text="${sv.hoTen}">
                        </td>

                        <td th:text="${sv.gioiTinh}"></td>

                        <td>

                            <span class="badge bg-light text-dark border"
                                  th:text="${sv.lop?.maLop ?: '-'}">
                            </span>

                        </td>

                        <td class="text-muted small"
                            th:text="${sv.email ?: '-'}">
                        </td>

                        <td>

                            <span class="badge status-badge"
                                  th:classappend="${sv.trangThai != null and sv.trangThai.name()=='DANG_HOC' ? 'bg-success' : 'bg-secondary'}"
                                  th:text="${sv.trangThai != null ? sv.trangThai : ''}">
                            </span>

                        </td>

                        <!-- ACTION -->
                        <td>

                            <div class="action-group">

                                <!-- DETAIL -->
                                <a th:href="@{/admin/sinh-vien/chi-tiet/{id}(id=${sv.id})}"
                                   class="btn btn-sm btn-outline-info action-btn"
                                   title="Xem chi tiết">

                                    <i class="fas fa-eye"></i>

                                </a>

                                <!-- EDIT -->
                                <a th:href="@{/admin/sinh-vien/sua/{id}(id=${sv.id})}"
                                   class="btn btn-sm btn-outline-warning action-btn"
                                   title="Chỉnh sửa">

                                    <i class="fas fa-edit"></i>

                                </a>

                                <!-- DELETE -->
                                <form th:action="@{/admin/sinh-vien/xoa/{id}(id=${sv.id})}"
                                      method="post"
                                      class="delete-form d-inline"
                                      th:data-id="${sv.id}"
                                      th:data-name="${sv.hoTen}"
                                      th:data-masv="${sv.maSv}">

                                    <input type="hidden"
                                           th:name="${_csrf.parameterName}"
                                           th:value="${_csrf.token}"/>

                                    <button type="submit"
                                            class="btn btn-sm btn-outline-danger action-btn"
                                            title="Xóa">

                                        <i class="fas fa-trash"></i>

                                    </button>

                                </form>

                            </div>

                        </td>

                    </tr>

                    </tbody>

                </table>

            </div>

        </div>

    </div>

    <script>

        // =========================
        // SEARCH REALTIME
        // =========================
        const searchInput = document.getElementById('searchInput');

        searchInput.addEventListener('keyup', function () {

            const keyword = this.value.toLowerCase();

            const rows = document.querySelectorAll('.student-row');

            let visibleCount = 0;

            rows.forEach(row => {

                const name = row.querySelector('.student-name')
                    .innerText
                    .toLowerCase();

                const text = row.innerText.toLowerCase();

                if(text.includes(keyword) || name.includes(keyword)){

                    row.style.display = '';

                    visibleCount++;

                }else{

                    row.style.display = 'none';

                }

            });

            let oldEmpty = document.getElementById('dynamicEmpty');

            if(oldEmpty){
                oldEmpty.remove();
            }

            if(visibleCount === 0){

                const tbody = document.getElementById('studentTableBody');

                const tr = document.createElement('tr');

                tr.id = 'dynamicEmpty';

                tr.innerHTML = `
                    <td colspan="8" class="text-center empty-box">

                        <i class="fas fa-user-slash fa-4x mb-3 d-block"></i>

                        <div class="empty-title">
                            Không có sinh viên
                        </div>

                        <div class="empty-desc">
                            Không tìm thấy tên phù hợp
                        </div>

                    </td>
                `;

                tbody.appendChild(tr);

            }

        });


        // =========================
        // CONFIRM DELETE
        // =========================
        document.querySelectorAll('.delete-form').forEach(form => {

            form.addEventListener('submit', function (e) {

                e.preventDefault();

                const id = this.dataset.id;
                const name = this.dataset.name;
                const maSv = this.dataset.masv;

                Swal.fire({

                    title: 'Xác nhận xóa?',
                    icon: 'warning',

                    html: `

                        <div style="font-size:15px;color:#64748b">
                            Bạn có chắc chắn muốn xóa sinh viên này?
                        </div>

                        <div class="delete-info">

                            <div class="delete-row">
                                <div class="delete-label">
                                    ID
                                </div>

                                <div class="delete-value">
                                    ${id}
                                </div>
                            </div>

                            <div class="delete-row">
                                <div class="delete-label">
                                    Mã SV
                                </div>

                                <div class="delete-value">
                                    ${maSv}
                                </div>
                            </div>

                            <div class="delete-row">
                                <div class="delete-label">
                                    Họ tên
                                </div>

                                <div class="delete-value">
                                    ${name}
                                </div>
                            </div>

                        </div>

                    `,

                    showCancelButton: true,
                    confirmButtonText: 'Xóa',
                    cancelButtonText: 'Hủy',



                    confirmButtonColor: '#dc2626',
                    cancelButtonColor: '#64748b',

                    background: '#ffffff',

                    padding: '2em',

                    reverseButtons: true

                }).then((result) => {

                    if(result.isConfirmed){

                        form.submit();

                    }

                });

            });

        });


       // =========================
// SUCCESS TOAST
// =========================
const successMessage = /*[[${success}]]*/ null;

if(successMessage){

    Swal.fire({

        toast: true,
        position: 'top-end',

        icon: 'success',

        title: successMessage,

        showConfirmButton: false,

        timer: 3000,
        timerProgressBar: true,

        background: '#ffffff',

        customClass:{
            popup:'rounded-4 shadow'
        }

    });

}


// =========================
// ERROR TOAST
// =========================
const errorMessage = /*[[${error}]]*/ null;

if(errorMessage){

    Swal.fire({

        toast: true,
        position: 'top-end',

        icon: 'error',

        title: errorMessage,

        showConfirmButton: false,

        timer: 3500,
        timerProgressBar: true,

        background: '#ffffff',

        customClass:{
            popup:'rounded-4 shadow'
        }

    });

}

    </script>

</th:block>

</body>
</html>
