<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::content}, 'Thông tin cá nhân')}">

<body>
<th:block th:fragment="content">

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        body { background: #f1f5f9; }

        /* CARD */
        .profile-card {
            border: none;
            border-radius: 28px;
            overflow: hidden;
            background: #fff;
            box-shadow: 0 12px 35px rgba(0,0,0,.08);
            max-width: 860px;
            margin: 0 auto;
        }

        /* HEADER */
        .profile-header {
            background: linear-gradient(135deg, #1e3a8a, #2563eb);
            padding: 40px;
            color: white;
            position: relative;
            overflow: hidden;
        }

        .profile-header::before {
            content: '';
            position: absolute;
            right: -60px; top: -60px;
            width: 220px; height: 220px;
            background: rgba(255,255,255,.07);
            border-radius: 50%;
        }

        .profile-header::after {
            content: '';
            position: absolute;
            right: 60px; bottom: -80px;
            width: 160px; height: 160px;
            background: rgba(255,255,255,.05);
            border-radius: 50%;
        }

        .avatar {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background: rgba(255,255,255,.15);
            border: 4px solid rgba(255,255,255,.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            color: white;
            flex-shrink: 0;
            position: relative;
            z-index: 1;
        }

        .profile-name {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .profile-code {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,.15);
            padding: 7px 14px;
            border-radius: 12px;
            font-size: 14px;
            color: #e2e8f0;
            margin-bottom: 10px;
        }

        .profile-class {
            font-size: 14px;
            color: rgba(255,255,255,.7);
        }

        /* BODY */
        .profile-body { padding: 36px; }

        /* SECTION TITLE */
        .section-title {
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #64748b;
            margin-bottom: 18px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e2e8f0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* INFO ITEM */
        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-bottom: 32px;
        }

        .info-item {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 18px;
            padding: 20px;
            position: relative;
            overflow: hidden;
            transition: all .25s ease;
        }

        .info-item::before {
            content: '';
            position: absolute;
            left: 0; top: 0;
            width: 4px; height: 100%;
            background: linear-gradient(180deg, #2563eb, #60a5fa);
        }

        .info-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(37,99,235,.1);
            background: #fff;
        }

        .info-label {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: .5px;
            color: #94a3b8;
            margin-bottom: 8px;
        }

        .info-value {
            font-size: 16px;
            font-weight: 700;
            color: #0f172a;
            word-break: break-word;
        }

        .info-icon {
            font-size: 20px;
            color: #bfdbfe;
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
        }

        .info-item.full-width {
            grid-column: 1 / -1;
        }

        /* STATUS */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 7px 14px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 700;
        }

        .status-active { background: #dcfce7; color: #15803d; }
        .status-inactive { background: #e2e8f0; color: #475569; }

        /* STATS ROW */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 32px;
        }

        .stat-box {
            background: linear-gradient(135deg, #eff6ff, #dbeafe);
            border-radius: 18px;
            padding: 22px;
            text-align: center;
            border: 1px solid #bfdbfe;
        }

        .stat-num {
            font-size: 32px;
            font-weight: 800;
            color: #1d4ed8;
            line-height: 1;
            margin-bottom: 6px;
        }

        .stat-label {
            font-size: 13px;
            color: #64748b;
            font-weight: 500;
        }

        /* ACTIONS */
        .action-wrapper {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            padding-top: 24px;
            border-top: 2px solid #f1f5f9;
        }

        .btn-custom {
            border: none;
            border-radius: 14px;
            padding: 12px 22px;
            font-weight: 600;
            transition: all .25s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        .btn-custom:hover { transform: translateY(-2px); }
        .btn-back { background: #e2e8f0; color: #0f172a; }
        .btn-back:hover { background: #cbd5e1; }
        .btn-register { background: linear-gradient(135deg, #2563eb, #1d4ed8); color: white; }
        .btn-register:hover { opacity: .9; }
        .btn-tkb { background: linear-gradient(135deg, #059669, #047857); color: white; }
        .btn-tkb:hover { opacity: .9; }

        @media (max-width: 768px) {
            .profile-header { flex-direction: column; text-align: center; gap: 20px; padding: 30px 20px; }
            .profile-body { padding: 22px; }
            .info-grid { grid-template-columns: 1fr; }
            .stats-row { grid-template-columns: 1fr; }
            .action-wrapper { flex-direction: column; }
            .btn-custom { justify-content: center; }
        }
    </style>

    <!-- Kiểm tra sinh viên tồn tại -->
    <div th:if="${sinhVien == null}" class="alert alert-warning rounded-4">
        <i class="fas fa-exclamation-triangle me-2"></i>
        Không tìm thấy thông tin sinh viên. Vui lòng liên hệ admin.
    </div>

    <div th:if="${sinhVien != null}" class="profile-card">

        <!-- HEADER -->
        <div class="profile-header d-flex align-items-center gap-4">

            <div class="avatar">
                <i class="fas fa-user-graduate"></i>
            </div>

            <div style="position:relative;z-index:1">

                <div class="profile-name" th:text="${sinhVien.hoTen}"></div>

                <div class="profile-code">
                    <i class="fas fa-id-badge"></i>
                    <span th:text="${sinhVien.maSv}"></span>
                </div>

                <div class="profile-class">
                    <i class="fas fa-door-open me-1"></i>
                    Lớp: <strong th:text="${sinhVien.lop?.tenLop ?: 'Chưa phân lớp'}"></strong>
                </div>

            </div>

            <!-- Status badge góc phải -->
            <div class="ms-auto" style="position:relative;z-index:1">
                <span class="status-badge"
                      th:classappend="${sinhVien.trangThai != null and sinhVien.trangThai.name()=='DANG_HOC' ? 'status-active' : 'status-inactive'}">
                    <i class="fas fa-circle" style="font-size:8px"></i>
                    <span th:text="${sinhVien.trangThai ?: 'N/A'}"></span>
                </span>
            </div>

        </div>

        <!-- BODY -->
        <div class="profile-body">

            <!-- THỐNG KÊ -->
            <div class="section-title">
                <i class="fas fa-chart-bar text-primary"></i>
                Tổng quan học tập
            </div>

            <div class="stats-row">

                <div class="stat-box">
                    <div class="stat-num" th:text="${soHocPhan}">0</div>
                    <div class="stat-label">Học phần đã đăng ký</div>
                </div>

                <div class="stat-box">
                    <div class="stat-num" th:text="${soHocPhanDat}">0</div>
                    <div class="stat-label">Học phần đã đạt</div>
                </div>

                <div class="stat-box">
                    <div class="stat-num"
                         th:text="${diemTB != null ? #numbers.formatDecimal(diemTB,1,2) : '-'}">
                        -
                    </div>
                    <div class="stat-label">Điểm trung bình</div>
                </div>

            </div>

            <!-- THÔNG TIN CÁ NHÂN -->
            <div class="section-title">
                <i class="fas fa-user text-primary"></i>
                Thông tin cá nhân
            </div>

            <div class="info-grid">

                <div class="info-item">
                    <div class="info-label">Họ và tên</div>
                    <div class="info-value" th:text="${sinhVien.hoTen ?: '-'}"></div>
                    <i class="fas fa-user info-icon"></i>
                </div>

                <div class="info-item">
                    <div class="info-label">Mã sinh viên</div>
                    <div class="info-value" th:text="${sinhVien.maSv ?: '-'}"></div>
                    <i class="fas fa-id-card info-icon"></i>
                </div>

                <div class="info-item">
                    <div class="info-label">Ngày sinh</div>
                    <div class="info-value" th:text="${sinhVien.ngaySinh ?: '-'}"></div>
                    <i class="fas fa-birthday-cake info-icon"></i>
                </div>

                <div class="info-item">
                    <div class="info-label">Giới tính</div>
                    <div class="info-value" th:text="${sinhVien.gioiTinh ?: '-'}"></div>
                    <i class="fas fa-venus-mars info-icon"></i>
                </div>

                <div class="info-item">
                    <div class="info-label">Email</div>
                    <div class="info-value" th:text="${sinhVien.email ?: '-'}"></div>
                    <i class="fas fa-envelope info-icon"></i>
                </div>

                <div class="info-item">
                    <div class="info-label">Số điện thoại</div>
                    <div class="info-value" th:text="${sinhVien.soDienThoai ?: '-'}"></div>
                    <i class="fas fa-phone info-icon"></i>
                </div>

                <div class="info-item">
                    <div class="info-label">Lớp học</div>
                    <div class="info-value" th:text="${sinhVien.lop?.tenLop ?: 'Chưa phân lớp'}"></div>
                    <i class="fas fa-door-open info-icon"></i>
                </div>

                <div class="info-item">
                    <div class="info-label">Trạng thái</div>
                    <div class="info-value">
                        <span class="status-badge"
                              th:classappend="${sinhVien.trangThai != null and sinhVien.trangThai.name()=='DANG_HOC' ? 'status-active' : 'status-inactive'}">
                            <i class="fas fa-circle" style="font-size:8px"></i>
                            <span th:text="${sinhVien.trangThai ?: '-'}"></span>
                        </span>
                    </div>
                </div>

                <div class="info-item full-width">
                    <div class="info-label">Địa chỉ</div>
                    <div class="info-value" th:text="${sinhVien.diaChi ?: '-'}"></div>
                    <i class="fas fa-map-marker-alt info-icon"></i>
                </div>

            </div>

            <!-- ACTIONS -->
            <div class="action-wrapper">

                <a th:href="@{/sinhvien/dashboard}" class="btn btn-custom btn-back">
                    <i class="fas fa-arrow-left"></i>
                    Quay lại
                </a>

                <a th:href="@{/sinhvien/dang-ky}" class="btn btn-custom btn-register">
                    <i class="fas fa-book-open"></i>
                    Đăng ký học phần
                </a>

                <a th:href="@{/tkb/cua-toi}" class="btn btn-custom btn-tkb">
                    <i class="fas fa-calendar-alt"></i>
                    Xem thời khóa biểu
                </a>

            </div>

        </div>

    </div>

    <!-- SUCCESS/ERROR TOAST -->
    <script th:inline="javascript">
        const successMsg = /*[[${success}]]*/ null;
        const errorMsg   = /*[[${error}]]*/ null;

        if (successMsg) {
            Swal.fire({ toast:true, position:'top-end', icon:'success',
                title: successMsg, showConfirmButton:false,
                timer:3000, timerProgressBar:true,
                customClass:{ popup:'rounded-4 shadow' } });
        }
        if (errorMsg) {
            Swal.fire({ toast:true, position:'top-end', icon:'error',
                title: errorMsg, showConfirmButton:false,
                timer:3500, timerProgressBar:true,
                customClass:{ popup:'rounded-4 shadow' } });
        }
    </script>

</th:block>
</body>
</html>
