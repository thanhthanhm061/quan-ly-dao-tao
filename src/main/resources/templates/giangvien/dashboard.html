<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::content}, 'Tổng quan Giảng viên')}">

<body>
<th:block th:fragment="content">

    <div class="row g-4 mb-4">
        <div class="col-12">
            <div class="card" th:if="${giangVien != null}">
                <div class="card-body d-flex align-items-center gap-4 p-4">
                    <div class="stat-icon" style="width:64px;height:64px;font-size:2rem;background:#d1fae5;color:#059669">
                        <i class="fas fa-user-tie"></i>
                    </div>
                    <div>
                        <h5 class="fw-bold mb-1" th:text="${giangVien.hoTenVaHocVi}"></h5>

                        <!-- FIX NULL -->
                        <span class="text-muted small"
                              th:text="${giangVien.chuyenNganh != null ? giangVien.chuyenNganh : '---'}"></span>

                        <!-- OK -->
                        <span class="ms-3 badge bg-info text-dark"
                              th:text="${giangVien.khoa != null ? giangVien.khoa.tenKhoa : '---'}"></span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
    <span>
      <i class="fas fa-clipboard-list me-2"></i>
      Lớp học phần đang phụ trách
    </span>

            <!-- FIX NULL LIST -->
            <span class="badge bg-success"
                  th:text="${lopHocPhans != null ? #lists.size(lopHocPhans) : 0} + ' lớp'"></span>
        </div>

        <div class="card-body p-0">
            <table class="table table-hover mb-0 align-middle">
                <thead>
                <tr>
                    <th>Mã LHP</th>
                    <th>Môn học</th>
                    <th>Học kỳ</th>
                    <th>Sĩ số</th>
                    <th>Trạng thái</th>
                    <th>Thao tác</th>
                </tr>
                </thead>

                <tbody>

                <!-- FIX NULL LIST -->
                <tr th:if="${lopHocPhans == null || #lists.isEmpty(lopHocPhans)}">
                    <td colspan="6" class="text-center text-muted py-4">
                        Chưa có lớp học phần nào
                    </td>
                </tr>

                <tr th:each="lhp : ${lopHocPhans}">
                    <td>
                        <code th:text="${lhp.maLhp != null ? lhp.maLhp : '---'}"></code>
                    </td>

                    <!-- bạn đã fix OK -->
                    <td class="fw-semibold"
                        th:text="${lhp.monHoc != null ? lhp.monHoc.tenMon : '---'}"></td>

                    <td>
            <span class="badge bg-info text-dark"
                  th:text="${lhp.hocKy != null ? lhp.hocKy : '---'}"></span>
                    </td>

                    <td th:text="${lhp.siSoHienTai+'/'+lhp.siSoMax}"></td>

                    <!-- FIX LỖI CHÍNH -->
                    <td>
            <span class="badge"
                  th:classappend="${lhp.trangThai != null && lhp.trangThai.name()=='MO' ? 'bg-success' : 'bg-secondary'}"
                  th:text="${lhp.trangThai != null ? lhp.trangThai : '---'}">
            </span>
                    </td>

                    <td>
                        <a th:href="@{/giangvien/lop/{id}/danh-sach(id=${lhp.id})}"
                           class="btn btn-sm btn-outline-primary">
                            <i class="fas fa-users me-1"></i>Danh sách SV
                        </a>
                    </td>
                </tr>

                </tbody>
            </table>
        </div>
    </div>

    <div class="mt-3">
        <a th:href="@{/tkb/cua-toi}" class="btn btn-outline-primary">
            <i class="fas fa-calendar me-1"></i>Xem thời khóa biểu
        </a>
    </div>

</th:block>
</body>
</html>
