<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::content}, 'Thêm/Sửa Giảng viên')}">

<body>

<th:block th:fragment="content">

    <style>

        body{
            background:#f1f5f9;
        }

        .gv-form-card{
            max-width:780px;
            margin:30px auto;
            border:none;
            border-radius:24px;
            overflow:hidden;
            box-shadow:0 15px 40px rgba(0,0,0,0.08);
            background:#fff;
        }

        .gv-form-header{
            background:linear-gradient(135deg,#1e3a8a,#2563eb);
            color:#fff;
            padding:20px 26px;
            font-size:20px;
            font-weight:700;
            display:flex;
            align-items:center;
            gap:10px;
        }

        .gv-form-body{
            padding:26px;
        }

        label{
            font-weight:600;
            color:#334155;
            margin-bottom:6px;
        }

        .form-control,
        .form-select{
            border-radius:12px;
            border:1px solid #e2e8f0;
            height:44px;
            transition:0.2s;
        }

        .form-control:focus,
        .form-select:focus{
            border-color:#2563eb;
            box-shadow:0 0 0 4px rgba(37,99,235,0.1);
        }

        textarea.form-control{
            height:auto;
        }

        .btn{
            border-radius:12px;
            padding:10px 18px;
            font-weight:600;
        }

        .btn-success{
            background:linear-gradient(135deg,#16a34a,#22c55e);
            border:none;
        }

        .btn-secondary{
            background:#e2e8f0;
            border:none;
            color:#334155;
        }

        .btn-secondary:hover{
            background:#cbd5e1;
        }

        .btn-success:hover{
            transform:translateY(-1px);
            box-shadow:0 10px 20px rgba(34,197,94,0.25);
        }

        .btn:active{
            transform:scale(0.98);
        }

        .form-title{
            font-size:18px;
            font-weight:700;
        }

    </style>

    <div class="gv-form-card">

        <!-- HEADER -->
        <div class="gv-form-header">
            <i class="fas fa-chalkboard-teacher"></i>
            <span th:text="${giangVien.id==null?'Thêm Giảng viên mới':'Cập nhật Giảng viên'}"></span>
        </div>

        <!-- BODY -->
        <div class="gv-form-body">

            <form th:action="${giangVien.id==null?'/admin/giang-vien/them':'/admin/giang-vien/sua/'+giangVien.id}"
                  th:object="${giangVien}" method="post">

                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <div class="row g-3">

                    <!-- MÃ GV -->
                    <div class="col-md-6">
                        <label>Mã giảng viên *</label>
                        <input type="text" class="form-control" th:field="*{maGv}"
                               th:readonly="${giangVien.id!=null}" placeholder="VD: GV001"/>
                        <div class="text-danger small" th:errors="*{maGv}"></div>
                    </div>

                    <!-- HỌ TÊN -->
                    <div class="col-md-6">
                        <label>Họ và tên *</label>
                        <input type="text" class="form-control" th:field="*{hoTen}" placeholder="Nguyễn Văn A"/>
                        <div class="text-danger small" th:errors="*{hoTen}"></div>
                    </div>

                    <!-- NGÀY SINH -->
                    <div class="col-md-6">
                        <label>Ngày sinh</label>
                        <input type="date" class="form-control" th:field="*{ngaySinh}"/>
                    </div>

                    <!-- HỌC VỊ -->
                    <div class="col-md-6">
                        <label>Học vị</label>
                        <select class="form-select" th:field="*{hocVi}">
                            <option value="">-- Chọn học vị --</option>
                            <option th:each="hv:${hocVis}" th:value="${hv}" th:text="${hv}"></option>
                        </select>
                    </div>

                    <!-- CHUYÊN NGÀNH -->
                    <div class="col-md-6">
                        <label>Chuyên ngành</label>
                        <input type="text" class="form-control" th:field="*{chuyenNganh}" placeholder="Công nghệ thông tin"/>
                    </div>

                    <!-- EMAIL -->
                    <div class="col-md-6">
                        <label>Email</label>
                        <input type="email" class="form-control" th:field="*{email}" placeholder="email@example.com"/>
                        <div class="text-danger small" th:errors="*{email}"></div>
                    </div>

                    <!-- SĐT -->
                    <div class="col-md-6">
                        <label>Số điện thoại</label>
                        <input type="text" class="form-control" th:field="*{soDienThoai}" placeholder="0901234567"/>
                    </div>

                    <!-- KHOA -->
                    <div class="col-12">
                        <label>Khoa</label>
                        <select class="form-select" th:field="*{khoa.id}">
                            <option value="">-- Chọn khoa --</option>
                            <option th:each="k:${khoas}" th:value="${k.id}" th:text="${k.tenKhoa}"></option>
                        </select>
                    </div>

                    <!-- BUTTON -->
                    <div class="col-12 d-flex justify-content-end gap-2 mt-3 pt-3 border-top">

                        <a th:href="@{/admin/giang-vien}" class="btn btn-secondary">
                            <i class="fas fa-arrow-left me-1"></i>Quay lại
                        </a>

                        <button type="submit" class="btn btn-success">
                            <i class="fas fa-save me-1"></i>
                            <span th:text="${giangVien.id==null?'Thêm mới':'Cập nhật'}"></span>
                        </button>

                    </div>

                </div>

            </form>

        </div>

    </div>

</th:block>

</body>
</html>
