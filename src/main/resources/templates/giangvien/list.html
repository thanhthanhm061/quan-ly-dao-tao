<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::content}, 'Quản lý Giảng viên')}">

<body>

<th:block th:fragment="content">

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>

        body{
            background:#f1f5f9;
        }

        .gv-card{
            border:none;
            border-radius:24px;
            overflow:hidden;
            box-shadow:0 10px 30px rgba(0,0,0,.08);
        }

        .gv-header{
            background:linear-gradient(135deg,#1e3a8a,#2563eb);
            color:white;
            padding:22px 28px;
        }

        .gv-title{
            font-size:24px;
            font-weight:700;
            display:flex;
            align-items:center;
            gap:12px;
        }

        .search-wrapper{
            display:flex;
            justify-content:flex-end;
            margin-bottom:22px;
        }

        .search-form{
            position:relative;
            width:320px;
        }

        .search-input{
            width:100%;
            height:46px;
            border:none;
            border-radius:14px;
            background:#f8fafc;
            padding:0 48px 0 18px;
            font-size:14px;
            border:1px solid #e2e8f0;
        }

        .search-input:focus{
            outline:none;
            border-color:#2563eb;
            box-shadow:0 0 0 4px rgba(37,99,235,.08);
        }

        .search-icon{
            position:absolute;
            top:50%;
            right:16px;
            transform:translateY(-50%);
            color:#64748b;
        }

        .table-responsive{
            border-radius:18px;
            overflow:hidden;
        }

        .table thead{
            background:#f8fafc;
        }

        .table thead th{
            border:none;
            padding:16px;
            font-size:14px;
            font-weight:700;
            color:#334155;
        }

        .table tbody td{
            padding:16px;
            vertical-align:middle;
        }

        .action-btn{
            width:38px;
            height:38px;
            border-radius:12px;
            display:flex;
            align-items:center;
            justify-content:center;
        }

        code{
            background:#eff6ff;
            color:#1d4ed8;
            padding:6px 10px;
            border-radius:8px;
        }

    </style>

    <div class="card gv-card">

        <!-- HEADER -->
        <div class="gv-header d-flex justify-content-between align-items-center">

            <div class="gv-title">
                <i class="fas fa-chalkboard-teacher"></i>
                <span>Danh sách Giảng viên</span>
            </div>

            <a th:href="@{/admin/giang-vien/them}"
               class="btn btn-light text-primary fw-semibold">
                <i class="fas fa-plus me-1"></i>Thêm mới
            </a>

        </div>

        <div class="card-body p-4">

            <!-- SEARCH -->
            <div class="search-wrapper">

                <form method="get" class="search-form">

                    <input type="text"
                           id="searchInput"
                           name="search"
                           class="search-input"
                           placeholder="Tìm kiếm theo tên giảng viên..."
                           th:value="${search}"/>

                    <i class="fas fa-search search-icon"></i>

                </form>

            </div>

            <!-- TABLE -->
            <div class="table-responsive">

                <table class="table table-hover align-middle">

                    <thead>
                    <tr>
                        <th>#</th>
                        <th>Mã GV</th>
                        <th>Họ tên</th>
                        <th>Học vị</th>
                        <th>Chuyên ngành</th>
                        <th>Email</th>
                        <th>Khoa</th>
                        <th>Thao tác</th>
                    </tr>
                    </thead>

                    <tbody id="gvTable">

                    <tr th:if="${#lists.isEmpty(giangViens)}">
                        <td colspan="8" class="text-center py-5 text-muted">
                            Không có dữ liệu
                        </td>
                    </tr>

                    <tr th:each="gv,i : ${giangViens}" class="gv-row">

                        <td th:text="${i.count}"></td>
                        <td><code th:text="${gv.maGv}"></code></td>

                        <td class="gv-name fw-semibold"
                            th:text="${gv.hoTen}">
                        </td>

                        <td th:text="${gv.hocVi ?: '-'}"></td>
                        <td th:text="${gv.chuyenNganh ?: '-'}"></td>
                        <td th:text="${gv.email ?: '-'}"></td>
                        <td th:text="${gv.khoa?.tenKhoa ?: '-'}"></td>

                        <td>
                            <div class="d-flex gap-2">

                                <a th:href="@{/admin/giang-vien/chi-tiet/{id}(id=${gv.id})}"
                                   class="btn btn-sm btn-outline-primary action-btn">
                                    <i class="fas fa-eye"></i>
                                </a>

                                <a th:href="@{/admin/giang-vien/sua/{id}(id=${gv.id})}"
                                   class="btn btn-sm btn-outline-warning action-btn">
                                    <i class="fas fa-edit"></i>
                                </a>

                                <form th:action="@{/admin/giang-vien/xoa/{id}(id=${gv.id})}"
                                      method="post"
                                      class="delete-form"
                                      th:data-id="${gv.id}"
                                      th:data-name="${gv.hoTen}"
                                      th:data-magv="${gv.maGv}">

                                    <input type="hidden"
                                           th:name="${_csrf.parameterName}"
                                           th:value="${_csrf.token}"/>

                                    <button class="btn btn-sm btn-outline-danger action-btn">
                                        <i class="fas fa-trash"></i>
                                    </button>

                                </form>

                            </div>
                        </td>

                    </tr>

                    </tbody>
                </table>

            </div>

        </div>
    </div>

    <script th:inline="javascript">




        // SEARCH
        const input = document.getElementById("searchInput");

        input?.addEventListener("keyup", function () {

            const value = this.value.toLowerCase();
            const rows = document.querySelectorAll(".gv-row");

            rows.forEach(row => {

                const name = row.querySelector(".gv-name")
                    .innerText
                    .toLowerCase();

                row.style.display = name.includes(value) ? "" : "none";

            });

        });


        // DELETE CONFIRM
        document.querySelectorAll('.delete-form').forEach(form => {

            form.addEventListener('submit', function (e) {
                e.preventDefault();

                const id = this.dataset.id;
                const name = this.dataset.name;
                const maGv = this.dataset.magv;

                Swal.fire({
                    title: 'Xác nhận xóa?',
                    icon: 'warning',
                    html: `
                        <div>
                            ID: ${id}<br>
                            Mã GV: ${maGv}<br>
                            Họ tên: ${name}
                        </div>
                    `,
                    confirmButtonColor: '#ef4444',
                    cancelButtonColor: '#64748b',
                    showCancelButton: true,
                    confirmButtonText: 'Xóa',
                    cancelButtonText: 'Hủy'
                }).then((result) => {
                    if (result.isConfirmed) form.submit();
                });

            });

        });

    </script>

</th:block>

</body>
</html>
