<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: layout(~{::content}, 'Quản lý Giảng viên')}">
<body><th:block th:fragment="content">
<div class="card">
  <div class="card-header d-flex justify-content-between align-items-center">
    <span><i class="fas fa-chalkboard-teacher me-2"></i>Danh sách Giảng viên</span>
    <a th:href="@{/admin/giang-vien/them}" class="btn btn-success btn-sm"><i class="fas fa-plus me-1"></i>Thêm mới</a>
  </div>
  <div class="card-body">
    <form method="get" class="d-flex gap-2 mb-3">
      <input type="text" name="search" class="form-control" placeholder="🔍 Tìm theo tên..." th:value="${search}"/>
      <button class="btn btn-outline-success px-4">Tìm</button>
      <a th:href="@{/admin/giang-vien}" class="btn btn-outline-secondary">Reset</a>
    </form>
    <div class="table-responsive">
      <table class="table table-hover align-middle">
        <thead><tr><th>#</th><th>Mã GV</th><th>Họ tên</th><th>Học vị</th><th>Chuyên ngành</th><th>Email</th><th>Khoa</th><th>Thao tác</th></tr></thead>
        <tbody>
          <tr th:if="${#lists.isEmpty(giangViens)}">
            <td colspan="8" class="text-center text-muted py-4"><i class="fas fa-inbox fa-2x d-block mb-2"></i>Không có dữ liệu</td>
          </tr>
          <tr th:each="gv,i : ${giangViens}">
            <td th:text="${i.count}"></td>
            <td><code th:text="${gv.maGv}"></code></td>
            <td class="fw-semibold" th:text="${gv.hoTen}"></td>
            <td><span class="badge bg-info text-dark" th:text="${gv.hocVi ?: '-'}"></span></td>
            <td class="small" th:text="${gv.chuyenNganh ?: '-'}"></td>
            <td class="small text-muted" th:text="${gv.email ?: '-'}"></td>
            <td class="small" th:text="${gv.khoa?.tenKhoa ?: '-'}"></td>
            <td>
              <a th:href="@{/admin/giang-vien/sua/{id}(id=${gv.id})}" class="btn btn-sm btn-outline-warning"><i class="fas fa-edit"></i></a>
              <form th:action="@{/admin/giang-vien/xoa/{id}(id=${gv.id})}" method="post" class="d-inline"
                    onsubmit="return confirm('Xác nhận xóa giảng viên này?')">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button class="btn btn-sm btn-outline-danger ms-1"><i class="fas fa-trash"></i></button>
              </form>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
</th:block></body></html>
