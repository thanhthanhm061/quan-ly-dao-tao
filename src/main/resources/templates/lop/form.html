<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: layout(~{::content}, 'Thêm/Sửa Lớp')}">
<body><th:block th:fragment="content">
<div class="card" style="max-width:560px;margin:0 auto">
  <div class="card-header">
    <i class="fas fa-door-open me-2"></i>
    <span th:text="${lop.id==null?'Thêm Lớp mới':'Cập nhật Lớp'}"></span>
  </div>
  <div class="card-body p-4">
    <form th:action="${lop.id==null?'/admin/lop/them':'/admin/lop/sua/'+lop.id}"
          th:object="${lop}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label fw-semibold">Mã lớp <span class="text-danger">*</span></label>
          <input type="text" class="form-control" th:field="*{maLop}"
                 th:readonly="${lop.id!=null}" placeholder="VD: CNTT01"/>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-semibold">Niên khóa</label>
          <input type="number" class="form-control" th:field="*{nienKhoa}" placeholder="VD: 2022"/>
        </div>
        <div class="col-12">
          <label class="form-label fw-semibold">Tên lớp <span class="text-danger">*</span></label>
          <input type="text" class="form-control" th:field="*{tenLop}" placeholder="VD: CNTT Khóa 2022 Lớp 1"/>
        </div>
        <div class="col-12">
          <label class="form-label fw-semibold">Khoa</label>
          <select class="form-select" th:field="*{khoa.id}">
            <option value="">-- Chọn khoa --</option>
            <option th:each="k:${khoas}" th:value="${k.id}" th:text="${k.tenKhoa}"></option>
          </select>
        </div>
        <div class="col-12 d-flex gap-2 justify-content-end mt-2 border-top pt-3">
          <a th:href="@{/admin/lop}" class="btn btn-secondary"><i class="fas fa-arrow-left me-1"></i>Quay lại</a>
          <button type="submit" class="btn btn-dark">
            <i class="fas fa-save me-1"></i>
            <span th:text="${lop.id==null?'Thêm mới':'Cập nhật'}"></span>
          </button>
        </div>
      </div>
    </form>
  </div>
</div>
</th:block></body></html>
