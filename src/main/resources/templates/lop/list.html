<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: layout(~{::content}, 'Quản lý Lớp học')}">
<body><th:block th:fragment="content">
<div class="card">
  <div class="card-header d-flex justify-content-between align-items-center">
    <span><i class="fas fa-door-open me-2"></i>Danh sách Lớp học</span>
    <a th:href="@{/admin/lop/them}" class="btn btn-secondary btn-sm"><i class="fas fa-plus me-1"></i>Thêm mới</a>
  </div>
  <div class="card-body p-0">
    <table class="table table-hover mb-0 align-middle">
      <thead><tr><th>#</th><th>Mã lớp</th><th>Tên lớp</th><th>Niên khóa</th><th>Khoa</th><th>Sĩ số</th><th>Thao tác</th></tr></thead>
      <tbody>
        <tr th:if="${#lists.isEmpty(lops)}">
          <td colspan="7" class="text-center text-muted py-4"><i class="fas fa-inbox fa-2x d-block mb-2"></i>Không có dữ liệu</td>
        </tr>
        <tr th:each="lop,i : ${lops}">
          <td th:text="${i.count}"></td>
          <td><code th:text="${lop.maLop}"></code></td>
          <td class="fw-semibold" th:text="${lop.tenLop}"></td>
          <td th:text="${lop.nienKhoa}"></td>
          <td class="small" th:text="${lop.khoa  != null ? lop.khoa.tenKhoa : '-'}"></td>
          <td><span class="badge bg-light text-dark border" th:text="${lop.sinhViens != null ? #lists.size(lop.sinhViens) : 0}+' SV'"></span></td>
          <td>
            <a th:href="@{/admin/lop/sua/{id}(id=${lop.id})}" class="btn btn-sm btn-outline-secondary"><i class="fas fa-edit"></i></a>
            <form th:action="@{/admin/lop/xoa/{id}(id=${lop.id})}" method="post" class="d-inline"
                  onsubmit="return confirm('Xác nhận xóa lớp này?')">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
              <button class="btn btn-sm btn-outline-danger ms-1"><i class="fas fa-trash"></i></button>
            </form>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
</th:block></body></html>
