<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::content}, 'Quản lý phòng học')}">
<body><th:block th:fragment="content">

    <style>
        .tkb-tabs {
            display:flex;
            gap:4px;
            background:#fff;
            border-radius:12px;
            padding:5px;
            box-shadow:var(--shadow);
            margin-bottom:22px;
        }

        .tkb-tabs .nav-item { flex:1; }

        .tkb-tabs .nav-link {
            border:none;
            border-radius:8px;
            font-weight:500;
            font-size:.85rem;
            color:var(--text-muted);
            padding:8px 10px;
            text-align:center;
            transition:.2s;
            white-space:nowrap;
        }

        .tkb-tabs .nav-link:hover {
            background:var(--surface);
            color:var(--navy);
        }

        .tkb-tabs .nav-link.active {
            background:var(--navy);
            color:#fff;
        }
        @import url('https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap');
        :root {
            --navy:#0f2542; --blue:#2563eb; --green:#059669; --rose:#dc2626;
            --surface:#f8fafc; --border:#e2e8f0; --text:#0f172a; --text-muted:#64748b;
            --radius:10px; --shadow:0 1px 3px rgba(0,0,0,.07),0 4px 16px rgba(0,0,0,.06);
        }
        body { font-family:'Be Vietnam Pro',sans-serif; background:#f1f5f9; }

        .page-header { display:flex; align-items:center; justify-content:space-between;
            margin-bottom:20px; flex-wrap:wrap; gap:10px; }
        .page-title { font-size:1.2rem; font-weight:700; color:var(--navy);
            display:flex; align-items:center; gap:8px; }
        .btn-add { background:var(--green); color:#fff; border:none; border-radius:8px;
            padding:9px 18px; font-size:.88rem; font-weight:600; text-decoration:none;
            display:inline-flex; align-items:center; gap:6px; transition:.18s; }
        .btn-add:hover { background:#047857; color:#fff; }

        .flash-success { background:#ecfdf5; border:1px solid #a7f3d0; color:#065f46;
            border-radius:8px; padding:10px 16px; margin-bottom:16px; font-size:.9rem; }
        .flash-error { background:#fef2f2; border:1px solid #fecaca; color:#991b1b;
            border-radius:8px; padding:10px 16px; margin-bottom:16px; font-size:.9rem; }

        /* Stats row */
        .stats-row { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:20px; }
        .stat-card { background:#fff; border:1px solid var(--border); border-radius:var(--radius);
            padding:16px 18px; box-shadow:var(--shadow); display:flex; align-items:center; gap:12px; }
        .stat-icon { width:40px; height:40px; border-radius:10px; display:flex;
            align-items:center; justify-content:center; font-size:1rem; flex-shrink:0; }
        .stat-icon.blue  { background:#dbeafe; color:#2563eb; }
        .stat-icon.green { background:#d1fae5; color:#059669; }
        .stat-icon.amber { background:#fef3c7; color:#d97706; }
        .stat-icon.rose  { background:#fee2e2; color:#dc2626; }
        .stat-num { font-size:1.4rem; font-weight:800; color:var(--navy); line-height:1; }
        .stat-lbl { font-size:.75rem; color:var(--text-muted); font-weight:500; }

        /* Filter */
        .filter-bar { background:#fff; border:1.5px solid var(--border); border-radius:var(--radius);
            padding:14px 18px; margin-bottom:16px; display:flex; gap:12px; align-items:center; flex-wrap:wrap; }
        .filter-bar input, .filter-bar select { border:1.5px solid var(--border); border-radius:7px;
            padding:7px 11px; font-size:.88rem; font-family:inherit; transition:.18s; }
        .filter-bar input:focus, .filter-bar select:focus { border-color:var(--blue);
            box-shadow:0 0 0 3px #dbeafe; outline:none; }
        .filter-bar label { font-size:.8rem; font-weight:600; color:var(--text-muted); white-space:nowrap; }

        /* Table */
        .card { border:1px solid var(--border); border-radius:var(--radius);
            box-shadow:var(--shadow); background:#fff; }
        .card-header { background:var(--navy); color:#fff;
            border-radius:var(--radius) var(--radius) 0 0 !important;
            padding:14px 20px; font-weight:600; border:none;
            display:flex; align-items:center; justify-content:space-between; }

        .room-table { width:100%; border-collapse:collapse; }
        .room-table thead th { background:var(--surface); font-size:.77rem; font-weight:700;
            color:var(--text-muted); text-transform:uppercase; letter-spacing:.05em;
            padding:10px 16px; border-bottom:2px solid var(--border); }
        .room-table tbody td { padding:12px 16px; font-size:.88rem; border-bottom:1px solid #f0f4f8;
            vertical-align:middle; }
        .room-table tbody tr:last-child td { border-bottom:none; }
        .room-table tbody tr:hover { background:#f8fafd; }
        .room-table tbody tr.inactive td { opacity:.55; }

        .tag { display:inline-flex; align-items:center; font-size:.73rem;
            padding:3px 9px; border-radius:20px; font-weight:600; }
        .tag-ly-thuyet { background:#dbeafe; color:#1e40af; }
        .tag-thuc-hanh { background:#d1fae5; color:#065f46; }
        .tag-hoi-truong { background:#ede9fe; color:#5b21b6; }
        .tag-phong-may  { background:#fef3c7; color:#92400e; }
        .tag-active   { background:#d1fae5; color:#065f46; }
        .tag-inactive { background:#fee2e2; color:#991b1b; }
        .tag-muted { background:#f1f5f9; color:#475569; border:1px solid #e2e8f0; }

        .ma-phong { font-weight:700; font-size:.95rem; color:var(--navy);
            font-family:'Courier New',monospace; }

        .cap-bar { width:80px; height:6px; border-radius:3px; background:#e5e7eb;
            overflow:hidden; display:inline-block; vertical-align:middle; margin-left:6px; }
        .cap-bar-fill { height:100%; border-radius:3px; background:var(--blue); }

        .action-btns { display:flex; gap:6px; }
        .btn-edit { display:inline-flex; align-items:center; gap:4px; padding:5px 11px;
            border:1.5px solid var(--border); border-radius:7px; background:#fff;
            font-size:.78rem; font-weight:600; color:#374151; text-decoration:none; transition:.18s; }
        .btn-edit:hover { background:var(--navy); color:#fff; border-color:var(--navy); }
        .btn-del { display:inline-flex; align-items:center; gap:4px; padding:5px 11px;
            border:1.5px solid #fecaca; border-radius:7px; background:#fff;
            font-size:.78rem; font-weight:600; color:var(--rose); cursor:pointer; transition:.18s; }
        .btn-del:hover { background:var(--rose); color:#fff; border-color:var(--rose); }

        .empty-state { text-align:center; padding:56px 20px; color:var(--text-muted); }
        .empty-state i { font-size:3rem; opacity:.2; display:block; margin-bottom:14px; }
        .empty-state h5 { font-weight:600; color:#334155; }

        @media(max-width:768px) { .stats-row { grid-template-columns:repeat(2,1fr); } }
    </style>
    </style>

    <!-- ── TABS ── -->
    <ul class="tkb-tabs nav">
            <a class="nav-link active" th:href="@{/admin/phong-hoc}">
                <i class="fas fa-door-open me-1"></i>Phòng học
            </a>
        </li>
    </ul>

    <!-- Flash messages -->
    <div th:if="${success}" class="flash-success">
        <i class="fas fa-check-circle me-2"></i><span th:text="${success}"></span>
    </div>
    <!-- Flash messages -->
    <div th:if="${success}" class="flash-success">
        <i class="fas fa-check-circle me-2"></i><span th:text="${success}"></span>
    </div>
    <div th:if="${error}" class="flash-error">
        <i class="fas fa-exclamation-circle me-2"></i><span th:text="${error}"></span>
    </div>

    <!-- Page header -->
    <div class="page-header">
        <div class="page-title">
            <i class="fas fa-door-open" style="color:var(--blue)"></i>
            Quản lý phòng học
        </div>
        <a th:href="@{/admin/phong-hoc/them}" class="btn-add">
            <i class="fas fa-plus"></i>Thêm phòng mới
        </a>
    </div>

    <!-- Stats -->
    <!-- Stats -->
    <div class="stats-row">

        <!-- Tổng phòng -->
        <div class="stat-card">
            <div class="stat-icon blue">
                <i class="fas fa-door-open"></i>
            </div>

            <div>
                <div class="stat-num" th:text="${tongPhong}">0</div>
                <div class="stat-lbl">Tổng phòng</div>
            </div>
        </div>

        <!-- Đang hoạt động -->
        <div class="stat-card">
            <div class="stat-icon green">
                <i class="fas fa-check-circle"></i>
            </div>

            <div>
                <div class="stat-num" th:text="${dangHoatDong}">0</div>
                <div class="stat-lbl">Đang hoạt động</div>
            </div>
        </div>

        <!-- Tổng sức chứa -->
        <div class="stat-card">
            <div class="stat-icon amber">
                <i class="fas fa-users"></i>
            </div>

            <div>
                <div class="stat-num" th:text="${tongSucChua}">0</div>
                <div class="stat-lbl">Tổng sức chứa</div>
            </div>
        </div>

        <!-- Vô hiệu -->
        <div class="stat-card">
            <div class="stat-icon rose">
                <i class="fas fa-ban"></i>
            </div>

            <div>
                <div class="stat-num" th:text="${voHieu}">0</div>
                <div class="stat-lbl">Vô hiệu hóa</div>
            </div>
        </div>

    </div>
    <!-- Filter bar -->
    <div class="filter-bar">
        <label><i class="fas fa-search me-1"></i>Tìm kiếm:</label>
        <input type="text" id="searchInput" placeholder="Mã phòng, tên phòng..." style="min-width:200px"/>
        <label>Loại phòng:</label>
        <select id="loaiFilter">
            <option value="">Tất cả</option>
            <option value="LY_THUYET">Lý thuyết</option>
            <option value="THUC_HANH">Thực hành</option>
            <option value="HOI_TRUONG">Hội trường</option>
            <option value="PHONG_MAY">Phòng máy</option>
        </select>
        <label>Trạng thái:</label>
        <select id="trangThaiFilter">
            <option value="">Tất cả</option>
            <option value="active">Hoạt động</option>
            <option value="inactive">Vô hiệu</option>
        </select>
    </div>

    <!-- Table -->
    <div class="card">
        <div class="card-header">
            <span><i class="fas fa-list me-2"></i>Danh sách phòng học</span>
            <span class="tag tag-muted" id="roomCount"
                  th:text="${#lists.size(danhSachPhong)} + ' phòng'"></span>
        </div>
        <div class="card-body p-0">
            <div th:if="${#lists.isEmpty(danhSachPhong)}" class="empty-state">
                <i class="fas fa-door-open"></i>
                <h5>Chưa có phòng học nào</h5>
                <p>Bấm "Thêm phòng mới" để bắt đầu.</p>
            </div>
            <div th:unless="${#lists.isEmpty(danhSachPhong)}">
                <table class="room-table" id="roomTable">
                    <thead>
                    <tr>
                        <th>Mã phòng</th>
                        <th>Tên phòng</th>
                        <th class="text-center">Sức chứa</th>
                        <th class="text-center">Loại phòng</th>
                        <th class="text-center">Trạng thái</th>
                        <th>Ghi chú</th>
                        <th class="text-center">Thao tác</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="p : ${danhSachPhong}"
                        th:classappend="${!p.hoatDong} ? 'inactive' : ''"
                        th:attr="data-ma=${p.maPhong}, data-loai=${p.loaiPhong}, data-active=${p.hoatDong}">
                        <td>
                            <span class="ma-phong" th:text="${p.maPhong}"></span>
                        </td>
                        <td th:text="${p.tenPhong != null ? p.tenPhong : '—'}"></td>
                        <td class="text-center">
                            <div style="display:flex;align-items:center;justify-content:center;gap:6px">
                                <span class="fw-semibold" th:text="${p.sucChua}"></span>
                                <div class="cap-bar">
                                    <div class="cap-bar-fill"
                                         th:style="'width:' + ${T(java.lang.Math).min(p.sucChua * 100 / 200, 100)} + '%'">
                                    </div>
                                </div>
                            </div>
                        </td>
                        <td class="text-center">
            <span class="tag"
                  th:classappend="${p.loaiPhong != null ? 'tag-' + p.loaiPhong.name().toLowerCase().replace('_','-') : 'tag-muted'}"
                  th:text="${p.loaiPhong != null ? p.loaiPhong.name().replace('_',' ') : '—'}">
            </span>
                        </td>
                        <td class="text-center">
            <span class="tag" th:classappend="${p.hoatDong ? 'tag-active' : 'tag-inactive'}"
                  th:text="${p.hoatDong ? 'Hoạt động' : 'Vô hiệu'}"></span>
                        </td>
                        <td style="font-size:.83rem;color:var(--text-muted)"
                            th:text="${p.ghiChu != null ? p.ghiChu : '—'}"></td>
                        <td>
                            <div class="action-btns" style="justify-content:center">
                                <a th:href="@{/admin/phong-hoc/sua/{id}(id=${p.id})}" class="btn-edit">
                                    <i class="fas fa-edit"></i>Sửa
                                </a>
                                <form th:action="@{/admin/phong-hoc/xoa/{id}(id=${p.id})}" method="post"
                                      class="d-inline"
                                      onsubmit="return confirm('Vô hiệu hóa phòng này?')">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <button type="submit" class="btn-del">
                                        <i class="fas fa-ban"></i>Vô hiệu
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        (function(){
            const searchInput = document.getElementById('searchInput');
            const loaiFilter  = document.getElementById('loaiFilter');
            const ttFilter    = document.getElementById('trangThaiFilter');
            const countEl     = document.getElementById('roomCount');

            function filterTable() {
                const q    = searchInput.value.toLowerCase();
                const loai = loaiFilter.value;
                const tt   = ttFilter.value;
                const rows = document.querySelectorAll('#roomTable tbody tr');
                let visible = 0;
                rows.forEach(row => {
                    const ma     = (row.dataset.ma || '').toLowerCase();
                    const loaiR  = row.dataset.loai || '';
                    const active = row.dataset.active;
                    const text   = row.textContent.toLowerCase();

                    const matchQ  = !q    || text.includes(q);
                    const matchL  = !loai || loaiR === loai;
                    const matchTT = !tt   || (tt === 'active' ? active === 'true' : active === 'false');

                    row.style.display = (matchQ && matchL && matchTT) ? '' : 'none';
                    if (matchQ && matchL && matchTT) visible++;
                });
                if (countEl) countEl.textContent = visible + ' phòng';
            }

            searchInput?.addEventListener('input', filterTable);
            loaiFilter?.addEventListener('change', filterTable);
            ttFilter?.addEventListener('change', filterTable);
        })();
    </script>

</th:block></body></html>
