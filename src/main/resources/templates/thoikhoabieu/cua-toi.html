<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::content}, 'Thời khóa biểu của tôi')}">
<body><th:block th:fragment="content">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap');

        :root {
            --navy:#0f2542; --blue:#2563eb; --green:#059669;
            --surface:#f8fafc; --border:#e2e8f0; --text:#0f172a; --text-muted:#64748b;
            --radius:10px; --shadow:0 1px 3px rgba(0,0,0,.07),0 4px 16px rgba(0,0,0,.06);
        }
        body { font-family:'Be Vietnam Pro',sans-serif; background:#f1f5f9; }

        /* Top bar */
        .top-bar { display:flex; align-items:center; justify-content:space-between;
            flex-wrap:wrap; gap:12px; margin-bottom:20px; }
        .user-chip { display:inline-flex; align-items:center; gap:8px; padding:8px 14px;
            background:#fff; border:1px solid var(--border); border-radius:20px;
            font-size:.85rem; font-weight:500; box-shadow:var(--shadow); }
        .user-chip .avatar { width:28px; height:28px; border-radius:50%;
            background:var(--navy); color:#fff; display:flex; align-items:center;
            justify-content:center; font-size:.75rem; font-weight:700; }

        .hky-form { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
        .hky-form label { font-size:.82rem; font-weight:600; color:var(--text-muted);
            text-transform:uppercase; letter-spacing:.04em; }
        .hky-form select { border:1.5px solid var(--border); border-radius:8px;
            font-size:.9rem; padding:8px 12px; min-width:180px; transition:.18s; }
        .hky-form select:focus { border-color:var(--blue); box-shadow:0 0 0 3px #dbeafe; outline:none; }
        .btn-view { background:var(--navy); color:#fff; border:none; border-radius:8px;
            padding:8px 16px; font-size:.88rem; font-weight:600; cursor:pointer; transition:.18s; }
        .btn-view:hover { background:#1e3a5f; }

        /* Card */
        .card { border:1px solid var(--border); border-radius:var(--radius);
            box-shadow:var(--shadow); background:#fff; margin-bottom:20px; }
        .card-header { background:var(--navy); color:#fff;
            border-radius:var(--radius) var(--radius) 0 0 !important;
            padding:14px 20px; font-weight:600; border:none;
            display:flex; align-items:center; justify-content:space-between; }

        /* Legend */
        .legend-row { padding:10px 16px 8px; display:flex; gap:6px; flex-wrap:wrap;
            border-bottom:1px solid var(--border); background:#fafbfc; }
        .legend-pill { font-size:.73rem; padding:3px 10px; border-radius:20px; font-weight:500; }

        /* Grid */
        .tkb-grid-wrap { overflow-x:auto; }
        .tkb-grid { width:100%; min-width:700px; border-collapse:collapse; table-layout:fixed; }
        .tkb-grid th { background:var(--navy); color:#fff; font-weight:600; font-size:.8rem;
            padding:10px 6px; text-align:center; border:1px solid rgba(255,255,255,.1); }
        .tkb-grid td { border:1px solid #e8edf3; padding:0; vertical-align:top;
            position:relative; overflow:visible; height:52px; }
        .tkb-grid td.tiet-label { background:var(--surface); font-size:.78rem; font-weight:700;
            color:var(--text-muted); text-align:center; vertical-align:middle; }
        .tkb-cell { position:absolute; z-index:2; left:2px; right:2px; top:2px;
            border-radius:6px; overflow:hidden; display:flex; flex-direction:column;
            justify-content:center; padding:5px 7px; transition:transform .15s,box-shadow .15s; }
        .tkb-cell:hover { transform:scale(1.02); z-index:10; box-shadow:0 4px 16px rgba(0,0,0,.12); }
        .tkb-cell .mon { font-size:.73rem; font-weight:700; line-height:1.25; }
        .tkb-cell .meta { font-size:.66rem; opacity:.75; margin-top:2px; }

        /* Detail table */
        .detail-table { width:100%; border-collapse:collapse; }
        .detail-table thead th { background:var(--surface); font-size:.78rem; font-weight:700;
            color:var(--text-muted); text-transform:uppercase; letter-spacing:.04em;
            padding:10px 16px; border-bottom:2px solid var(--border); }
        .detail-table tbody td { padding:11px 16px; font-size:.88rem; border-bottom:1px solid #f0f4f8;
            vertical-align:middle; }
        .detail-table tbody tr:last-child td { border-bottom:none; }
        .detail-table tbody tr:hover { background:#f8fafd; }

        .tag { display:inline-flex; align-items:center; font-size:.75rem;
            padding:3px 10px; border-radius:20px; font-weight:600; }
        .tag-primary { background:#dbeafe; color:#1e40af; }
        .tag-muted { background:#f1f5f9; color:#475569; border:1px solid #e2e8f0; }

        .btn-week { display:inline-flex; align-items:center; gap:5px; padding:5px 12px;
            border:1.5px solid rgba(255,255,255,.3); border-radius:7px; color:#fff;
            font-size:.8rem; font-weight:500; text-decoration:none; transition:.18s; }
        .btn-week:hover { background:rgba(255,255,255,.15); color:#fff; }

        /* Empty */
        .empty-state { text-align:center; padding:56px 20px; color:var(--text-muted); }
        .empty-state i { font-size:3rem; opacity:.25; display:block; margin-bottom:14px; }
        .empty-state h5 { font-weight:600; color:#334155; }
    </style>

    <!-- ── TOP BAR ── -->
    <div class="top-bar">
        <!-- Selector học kỳ -->
        <form method="get" class="hky-form">
            <label>Học kỳ</label>
            <select name="hocKy" onchange="this.form.submit()">
                <option value="">— Chọn học kỳ —</option>
                <option th:each="hk : ${danhSachHocKy}"
                        th:value="${hk}" th:text="${hk}"
                        th:selected="${hk == hocKyChon}"></option>
            </select>
        </form>

        <!-- User chip -->
        <div th:if="${tenNguoiDung != null}" class="user-chip">
            <div class="avatar">
                <i class="fas fa-user" style="font-size:.7rem"></i>
            </div>
            <span th:text="${tenNguoiDung}"></span>
        </div>
    </div>

    <!-- ── KẾT QUẢ ── -->
    <div th:if="${thoiKhoaBieus != null}">

        <div th:if="${#lists.isEmpty(thoiKhoaBieus)}" class="card">
            <div class="empty-state">
                <i class="fas fa-calendar-times"></i>
                <h5>Không có lịch học trong học kỳ này</h5>
                <p>Hãy thử chọn học kỳ khác.</p>
            </div>
        </div>

        <div th:unless="${#lists.isEmpty(thoiKhoaBieus)}">

            <!-- LƯỚI TKB -->
            <div class="card">
                <div class="card-header">
                    <div class="d-flex align-items-center gap-2">
                        <i class="fas fa-calendar-week"></i>
                        <span>Lịch học — <span th:text="${hocKyChon}"></span></span>
                        <span class="tag tag-primary ms-1"
                              th:text="${#lists.size(thoiKhoaBieus)} + ' buổi'"></span>
                    </div>
                    <a th:if="${hocKyChon != null}"
                       th:href="@{/tkb/theo-tuan(hocKy=${hocKyChon})}"
                       class="btn-week">
                        <i class="fas fa-calendar-alt"></i>Xem theo tuần
                    </a>
                </div>

                <!-- Legend -->
                <div class="legend-row">
                    <th:block th:each="tkb,i : ${thoiKhoaBieus}">
          <span class="legend-pill"
                th:style="'background:' + ${i.index%6==0?'#dbeafe;color:#1e40af':
                           i.index%6==1?'#d1fae5;color:#065f46':
                           i.index%6==2?'#fef3c7;color:#92400e':
                           i.index%6==3?'#ede9fe;color:#5b21b6':
                           i.index%6==4?'#fee2e2;color:#991b1b':'#e0f2fe;color:#0c4a6e'}"
                th:text="${tkb.lopHocPhan?.monHoc?.tenMon ?: '---'}">
          </span>
                    </th:block>
                </div>

                <div class="card-body p-0">
                    <div class="tkb-grid-wrap">
                        <table class="tkb-grid">
                            <colgroup>
                                <col style="width:60px"/>
                                <col/><col/><col/><col/><col/><col/>
                            </colgroup>
                            <thead>
                            <tr>
                                <th>Tiết</th>
                                <th>Thứ 2</th><th>Thứ 3</th><th>Thứ 4</th>
                                <th>Thứ 5</th><th>Thứ 6</th><th>Thứ 7</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="tiet : ${#numbers.sequence(1,12)}">
                                <td class="tiet-label" th:text="'T' + ${tiet}"></td>
                                <td th:each="thu : ${#numbers.sequence(2,7)}">
                                    <th:block th:each="tkb,i : ${thoiKhoaBieus}">
                                        <div th:if="${tkb.thuTrongTuan eq thu and tkb.tietBatDau eq tiet}"
                                             class="tkb-cell"
                                             th:style="'height:' + ${tkb.soTiet*52-4} + 'px;' +
                         'background:' + ${i.index%6==0?'#dbeafe':i.index%6==1?'#d1fae5':
                           i.index%6==2?'#fef3c7':i.index%6==3?'#ede9fe':
                           i.index%6==4?'#fee2e2':'#e0f2fe'} +
                         ';border-left:3px solid ' +
                         ${i.index%6==0?'#2563eb':i.index%6==1?'#059669':
                           i.index%6==2?'#d97706':i.index%6==3?'#7c3aed':
                           i.index%6==4?'#dc2626':'#0284c7'}">
                    <span class="mon"
                          th:style="'color:' + ${i.index%6==0?'#1e40af':i.index%6==1?'#065f46':
                            i.index%6==2?'#92400e':i.index%6==3?'#5b21b6':
                            i.index%6==4?'#991b1b':'#0c4a6e'}"
                          th:text="${tkb.lopHocPhan?.monHoc?.tenMon ?: '---'}"></span>
                                            <span class="meta text-muted"
                                                  th:text="'P.' + ${tkb.phongHoc ?: '?'} + ' · T' +
                                   ${tkb.tietBatDau} + '–' + ${tkb.tietBatDau+tkb.soTiet-1}"></span>
                                        </div>
                                    </th:block>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- CHI TIẾT LIST -->
            <div class="card">
                <div class="card-header">
                    <span><i class="fas fa-list me-2"></i>Chi tiết lịch học</span>
                </div>
                <div class="card-body p-0">
                    <table class="detail-table">
                        <thead>
                        <tr>
                            <th>#</th><th>Môn học</th><th>Thứ</th>
                            <th>Tiết</th><th>Phòng</th><th>Từ ngày</th><th>Đến ngày</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="tkb,i : ${thoiKhoaBieus}">
                            <td>
              <span class="tag"
                    th:style="'background:' + ${i.index%6==0?'#dbeafe;color:#1e40af':
                               i.index%6==1?'#d1fae5;color:#065f46':
                               i.index%6==2?'#fef3c7;color:#92400e':
                               i.index%6==3?'#ede9fe;color:#5b21b6':
                               i.index%6==4?'#fee2e2;color:#991b1b':'#e0f2fe;color:#0c4a6e'}"
                    th:text="${i.index+1}"></span>
                            </td>
                            <td class="fw-semibold" style="font-size:.88rem"
                                th:text="${tkb.lopHocPhan?.monHoc?.tenMon ?: '---'}"></td>
                            <td><span class="tag tag-primary" th:text="${tkb.tenThu}"></span></td>
                            <td style="font-size:.88rem"
                                th:text="'T' + ${tkb.tietBatDau} + ' → T' + ${tkb.tietBatDau+tkb.soTiet-1}"></td>
                            <td><span class="tag tag-muted"
                                      th:text="${tkb.phongHoc != null ? tkb.phongHoc : '—'}"></span></td>
                            <td style="font-size:.83rem;color:var(--text-muted)"
                                th:text="${tkb.tuanBatDau != null ? #temporals.format(tkb.tuanBatDau,'dd/MM/yyyy') : '—'}"></td>
                            <td style="font-size:.83rem;color:var(--text-muted)"
                                th:text="${tkb.tuanKetThuc != null ? #temporals.format(tkb.tuanKetThuc,'dd/MM/yyyy') : '—'}"></td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>

    <!-- ── CHƯA CHỌN ── -->
    <div th:if="${hocKyChon == null}" class="card">
        <div class="empty-state">
            <i class="fas fa-calendar-check"></i>
            <h5>Chọn học kỳ để xem thời khóa biểu của bạn</h5>
            <p>Lịch học sẽ hiển thị theo dạng lưới và danh sách chi tiết.</p>
        </div>
    </div>

</th:block></body></html>
