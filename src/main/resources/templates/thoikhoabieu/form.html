<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: layout(~{::content}, 'Thêm Thời khóa biểu')}">
<body><th:block th:fragment="content">
<div class="card" style="max-width:620px;margin:0 auto">
  <div class="card-header"><i class="fas fa-calendar-plus me-2"></i>Thêm Thời khóa biểu</div>
  <div class="card-body p-4">
    <form th:action="@{/tkb/them}" th:object="${thoiKhoaBieu}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <div class="row g-3">
        <div class="col-12">
          <label class="form-label fw-semibold">Lớp học phần <span class="text-danger">*</span></label>
          <select class="form-select" th:field="*{lopHocPhan.id}">
            <option value="">-- Chọn lớp học phần --</option>
            <option th:each="lhp:${lopHocPhans}" th:value="${lhp.id}"
                    th:text="${lhp.maLhp+' | '+lhp.monHoc.tenMon+' | '+lhp.hocKy}"></option>
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-semibold">Thứ trong tuần <span class="text-danger">*</span></label>
          <select class="form-select" th:field="*{thuTrongTuan}">
            <option value="2">Thứ 2</option><option value="3">Thứ 3</option>
            <option value="4">Thứ 4</option><option value="5">Thứ 5</option>
            <option value="6">Thứ 6</option><option value="7">Thứ 7</option>
          </select>
        </div>
        <div class="col-md-3">
          <label class="form-label fw-semibold">Tiết bắt đầu <span class="text-danger">*</span></label>
          <select class="form-select" th:field="*{tietBatDau}">
            <option th:each="t:${#numbers.sequence(1,12)}" th:value="${t}" th:text="'Tiết '+${t}"></option>
          </select>
        </div>
        <div class="col-md-3">
          <label class="form-label fw-semibold">Số tiết</label>
          <select class="form-select" th:field="*{soTiet}">
            <option value="1">1 tiết</option><option value="2">2 tiết</option>
            <option value="3" selected>3 tiết</option><option value="4">4 tiết</option>
            <option value="5">5 tiết</option>
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-semibold">Phòng học</label>
          <input type="text" class="form-control" th:field="*{phongHoc}" placeholder="VD: A101, Lab1"/>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-semibold">Tuần bắt đầu</label>
          <input type="date" class="form-control" th:field="*{tuanBatDau}"/>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-semibold">Tuần kết thúc</label>
          <input type="date" class="form-control" th:field="*{tuanKetThuc}"/>
        </div>
        <div class="alert alert-warning small p-2 mb-0">
          <i class="fas fa-exclamation-triangle me-1"></i>
          Hệ thống sẽ tự động kiểm tra trùng lịch của giảng viên trước khi lưu.
        </div>
        <div class="col-12 d-flex gap-2 justify-content-end border-top pt-3">
          <a th:href="@{/tkb}" class="btn btn-secondary"><i class="fas fa-arrow-left me-1"></i>Quay lại</a>
          <button type="submit" class="btn btn-success"><i class="fas fa-save me-1"></i>Lưu thời khóa biểu</button>
        </div>
      </div>
    </form>
  </div>
</div>
</th:block></body></html>
