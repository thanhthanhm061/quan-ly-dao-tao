<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::content}, 'Thêm Thời khóa biểu')}">
<body><th:block th:fragment="content">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap');

        :root {
            --navy:#0f2542; --blue:#2563eb; --green:#059669;
            --surface:#f8fafc; --border:#e2e8f0; --text:#0f172a; --text-muted:#64748b;
            --radius:10px; --shadow:0 1px 3px rgba(0,0,0,.07),0 4px 16px rgba(0,0,0,.06);
        }
        body { font-family:'Be Vietnam Pro',sans-serif; background:#f1f5f9; }

        .page-wrapper { max-width:760px; margin:0 auto; }

        .page-header { display:flex; align-items:center; gap:12px; margin-bottom:22px; }
        .page-header .back-btn { display:inline-flex; align-items:center; gap:6px;
            padding:7px 14px; border:1.5px solid var(--border); border-radius:8px; background:#fff;
            font-size:.85rem; font-weight:500; color:var(--text-muted); text-decoration:none; transition:.2s; }
        .page-header .back-btn:hover { background:var(--navy); color:#fff; border-color:var(--navy); }
        .page-header h4 { margin:0; font-weight:700; font-size:1.15rem; color:var(--navy); }

        .card { border:1px solid var(--border); border-radius:var(--radius);
            box-shadow:var(--shadow); background:#fff; }

        /* Section dividers */
        .form-section { padding:22px 26px; border-bottom:1px solid #f0f4f8; }
        .form-section:last-child { border-bottom:none; }
        .section-title { font-size:.72rem; font-weight:700; text-transform:uppercase;
            letter-spacing:.07em; color:var(--text-muted); margin-bottom:16px;
            display:flex; align-items:center; gap:6px; }
        .section-title::after { content:''; flex:1; height:1px; background:var(--border); }

        .form-label { font-size:.83rem; font-weight:600; color:#374151; margin-bottom:5px; }
        .form-label .req { color:#dc2626; }
        .form-label .hint { font-weight:400; font-size:.78rem; color:var(--text-muted); margin-left:4px; }

        .form-select, .form-control { border:1.5px solid var(--border); border-radius:8px;
            font-size:.9rem; padding:9px 12px; color:var(--text); transition:.18s; }
        .form-select:focus, .form-control:focus { border-color:var(--blue); box-shadow:0 0 0 3px #dbeafe; outline:none; }

        /* Info alert */
        .info-box { background:#eff6ff; border:1px solid #bfdbfe; border-radius:8px;
            padding:10px 14px; font-size:.83rem; color:#1e40af; display:none; margin-top:8px; }
        .info-box i { margin-right:5px; }

        .warn-box { background:#fffbeb; border:1px solid #fde68a; border-radius:8px;
            padding:10px 14px; font-size:.83rem; color:#92400e; margin-top:4px; }
        .warn-box i { margin-right:5px; }

        /* Room search */
        .input-group .form-select { border-right:0; border-radius:8px 0 0 8px !important; }
        .input-group .btn { border-radius:0 8px 8px 0 !important; }
        .btn-outline-primary { border:1.5px solid var(--blue); color:var(--blue); border-radius:8px;
            font-size:.85rem; font-weight:600; padding:9px 14px; }
        .btn-outline-primary:hover { background:var(--blue); color:#fff; }

        .room-results { margin-top:10px; }
        .room-results .label { font-size:.78rem; font-weight:700; color:var(--text-muted);
            text-transform:uppercase; letter-spacing:.04em; margin-bottom:6px; }
        .room-btn { display:inline-flex; align-items:center; gap:5px; padding:5px 12px;
            border:1.5px solid #d1fae5; background:#f0fdf4; border-radius:20px;
            font-size:.8rem; font-weight:600; color:#065f46; cursor:pointer; transition:.18s;
            margin:2px; }
        .room-btn:hover, .room-btn.selected { background:var(--green); color:#fff; border-color:var(--green); }
        .room-btn .cap { font-size:.72rem; opacity:.8; }

        .room-empty { background:#fffbeb; border:1px solid #fde68a; border-radius:8px;
            padding:9px 14px; font-size:.83rem; color:#92400e; margin-top:8px; display:none; }

        /* Buttons */
        .btn-success { background:var(--green); border-color:var(--green); border-radius:8px;
            font-weight:600; font-size:.9rem; padding:10px 24px; }
        .btn-success:hover { background:#047857; border-color:#047857; }
        .btn-secondary { background:#f1f5f9; border-color:#e2e8f0; color:#475569;
            border-radius:8px; font-weight:600; font-size:.9rem; padding:10px 20px; }
        .btn-secondary:hover { background:#e2e8f0; }

        /* Tuan hoc chips preview */
        .tuan-preview { display:flex; flex-wrap:wrap; gap:4px; margin-top:8px; }
        .tuan-chip { font-size:.72rem; padding:2px 8px; border-radius:12px;
            background:#dbeafe; color:#1e40af; font-weight:600; }
    </style>

    <div class="page-wrapper">

        <!-- Header -->
        <div class="page-header">
            <a th:href="@{/tkb}" class="back-btn">
                <i class="fas fa-arrow-left"></i> Quay lại
            </a>
            <div>
                <h4><i class="fas fa-calendar-plus me-2" style="color:var(--blue)"></i>Thêm Thời khóa biểu</h4>
            </div>
        </div>

        <div class="card">
            <form th:action="@{/tkb/them}" th:object="${thoiKhoaBieu}" method="post" id="tkbForm">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <!-- ① LỚP HỌC PHẦN -->
                <div class="form-section">
                    <div class="section-title"><i class="fas fa-book-open me-1"></i>Lớp học phần</div>
                    <label class="form-label">Lớp học phần <span class="req">*</span></label>
                    <select class="form-select" th:field="*{lopHocPhan.id}" id="lhpSelect" required>
                        <option value="">— Chọn lớp học phần —</option>
                        <option th:each="lhp : ${lopHocPhans}"
                                th:value="${lhp.id}"
                                th:text="${lhp.maLhp + ' | ' + lhp.monHoc.tenMon + ' | ' + lhp.hocKy}"
                                th:attr="data-tinchi=${lhp.monHoc.soTinChi},
                           data-hocky=${lhp.hocKy},
                           data-mon=${lhp.monHoc.tenMon}">
                        </option>
                    </select>
                    <div id="tinChiInfo" class="info-box">
                        <i class="fas fa-info-circle"></i><span id="tinChiText"></span>
                    </div>
                </div>

                <!-- ② LỊCH HỌC -->
                <div class="form-section">
                    <div class="section-title"><i class="fas fa-clock me-1"></i>Thời gian &amp; tiết học</div>
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label class="form-label">Thứ trong tuần <span class="req">*</span></label>
                            <select class="form-select" th:field="*{thuTrongTuan}" id="thuSelect">
                                <option value="2">Thứ 2</option>
                                <option value="3">Thứ 3</option>
                                <option value="4">Thứ 4</option>
                                <option value="5">Thứ 5</option>
                                <option value="6">Thứ 6</option>
                                <option value="7">Thứ 7</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Tiết bắt đầu <span class="req">*</span></label>
                            <select class="form-select" th:field="*{tietBatDau}" id="tietSelect">
                                <option th:each="t : ${#numbers.sequence(1,12)}"
                                        th:value="${t}" th:text="'Tiết ' + ${t}"></option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Số tiết</label>
                            <select class="form-select" th:field="*{soTiet}" id="soTietSelect">
                                <option value="1">1 tiết</option>
                                <option value="2">2 tiết</option>
                                <option value="3" selected>3 tiết</option>
                                <option value="4">4 tiết</option>
                                <option value="5">5 tiết</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- ③ PHÒNG HỌC -->
                <div class="form-section">
                    <div class="section-title"><i class="fas fa-door-open me-1"></i>Phòng học</div>
                    <label class="form-label">Phòng học <span class="hint">(bỏ trống nếu chưa xếp)</span></label>
                    <div class="input-group">
                        <select class="form-select" th:field="*{phongHoc}" id="phongSelect">
                            <option value="">— Chọn phòng —</option>
                            <option th:each="p : ${danhSachPhong}"
                                    th:value="${p.maPhong}"
                                    th:text="${p.maPhong + ' (' + p.sucChua + ' chỗ' +
                    (p.loaiPhong != null ? ' · ' + p.loaiPhong.name() : '') + ')'}">
                            </option>
                        </select>
                        <button type="button" class="btn btn-outline-primary" id="btnTimPhong">
                            <i class="fas fa-search me-1"></i>Tìm phòng trống
                        </button>
                    </div>

                    <!-- Kết quả phòng trống -->
                    <div id="phongTrongResult" class="room-results" style="display:none">
                        <div class="label">
                            Phòng trống: <span id="phongTrongCount" style="color:var(--green)"></span>
                        </div>
                        <div id="phongTrongItems"></div>
                    </div>
                    <div id="phongTrongEmpty" class="room-empty">
                        <i class="fas fa-exclamation-triangle"></i>Không có phòng trống cho ca học này
                    </div>
                </div>

                <!-- ④ TUẦN HỌC -->
                <div class="form-section">
                    <div class="section-title"><i class="fas fa-calendar-week me-1"></i>Khoảng thời gian</div>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Tuần bắt đầu</label>
                            <input type="date" class="form-control" th:field="*{tuanBatDau}" id="tuanBatDau"/>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Tuần kết thúc</label>
                            <input type="date" class="form-control" th:field="*{tuanKetThuc}" id="tuanKetThuc"/>
                        </div>
                        <div id="soTuanInfo" class="col-12" style="display:none">
                            <div class="info-box" style="display:flex;margin-top:0">
                                <i class="fas fa-calendar-check me-1"></i>
                                <span id="soTuanText"></span>
                            </div>
                        </div>
                        <div class="col-12">
                            <label class="form-label">
                                Tuần học cụ thể <span class="hint">(bỏ trống = áp dụng tất cả các tuần)</span>
                            </label>
                            <input type="text" class="form-control" th:field="*{tuanHoc}" id="tuanHocInput"
                                   placeholder="VD: 1,2,3,5,7 — bỏ tuần lễ"/>
                            <div class="form-text" style="font-size:.78rem">
                                Nhập số tuần cách nhau bởi dấu phẩy.
                            </div>
                            <div id="tuanPreview" class="tuan-preview"></div>
                        </div>
                    </div>
                </div>

                <!-- ⑤ CẢNH BÁO + ACTIONS -->
                <div class="form-section">
                    <div class="warn-box">
                        <i class="fas fa-shield-alt"></i>
                        Hệ thống tự động kiểm tra <strong>trùng lịch giảng viên</strong>
                        và <strong>trùng phòng học</strong> trước khi lưu.
                    </div>
                    <div class="d-flex gap-2 justify-content-end mt-4">
                        <a th:href="@{/tkb}" class="btn btn-secondary">
                            <i class="fas fa-times me-1"></i>Hủy
                        </a>
                        <button type="submit" class="btn btn-success">
                            <i class="fas fa-save me-1"></i>Lưu thời khóa biểu
                        </button>
                    </div>
                </div>

            </form>
        </div>
    </div>

    <script th:inline="javascript">
        (function () {
            const lhpSelect    = document.getElementById('lhpSelect');
            const thuSelect    = document.getElementById('thuSelect');
            const tietSelect   = document.getElementById('tietSelect');
            const soTietSelect = document.getElementById('soTietSelect');
            const phongSelect  = document.getElementById('phongSelect');
            const btnTim       = document.getElementById('btnTimPhong');
            const tuanBatDau   = document.getElementById('tuanBatDau');
            const tuanKetThuc  = document.getElementById('tuanKetThuc');
            const tuanHocInput = document.getElementById('tuanHocInput');

            // ── Thông tin tín chỉ khi chọn LHP ──
            lhpSelect.addEventListener('change', function () {
                const opt    = this.selectedOptions[0];
                const info   = document.getElementById('tinChiInfo');
                const text   = document.getElementById('tinChiText');
                const tinChi = parseInt(opt?.dataset?.tinchi || '0');
                const mon    = opt?.dataset?.mon || '';
                if (!this.value || tinChi === 0) { info.style.display = 'none'; return; }
                const tongTiet = tinChi * 15;
                const tietTuan = Math.ceil(tongTiet / 15);
                text.textContent = mon + ' — ' + tinChi + ' TC = ' + tongTiet +
                    ' tiết/kỳ. Gợi ý số tiết/buổi: ' + Math.min(Math.max(tietTuan, 2), 5) + ' tiết.';
                soTietSelect.value = Math.min(Math.max(tietTuan, 2), 5);
                info.style.display = 'flex';
            });

            // ── Số tuần ──
            function tinhSoTuan() {
                const bd = tuanBatDau.value, kt = tuanKetThuc.value;
                const infoEl = document.getElementById('soTuanInfo');
                const textEl = document.getElementById('soTuanText');
                if (!bd || !kt) { infoEl.style.display = 'none'; return; }
                const soTuan = Math.round((new Date(kt) - new Date(bd)) / (7*24*3600*1000)) + 1;
                if (soTuan <= 0) { infoEl.style.display = 'none'; return; }
                textEl.textContent = 'Khoảng thời gian: ' + soTuan + ' tuần (' +
                    new Date(bd).toLocaleDateString('vi-VN') + ' → ' + new Date(kt).toLocaleDateString('vi-VN') + ')';
                document.querySelector('#soTuanInfo .info-box').style.display = 'flex';
                infoEl.style.display = '';
            }
            tuanBatDau.addEventListener('change', tinhSoTuan);
            tuanKetThuc.addEventListener('change', tinhSoTuan);

            // ── Preview tuần học ──
            tuanHocInput.addEventListener('input', function () {
                const preview = document.getElementById('tuanPreview');
                const val = this.value.trim();
                preview.innerHTML = '';
                if (!val) return;
                val.split(',').map(s => s.trim()).filter(Boolean).forEach(t => {
                    const chip = document.createElement('span');
                    chip.className = 'tuan-chip';
                    chip.textContent = 'Tuần ' + t;
                    preview.appendChild(chip);
                });
            });

            // ── Tìm phòng trống ──
            btnTim.addEventListener('click', async function () {
                const opt    = lhpSelect.selectedOptions[0];
                const hocKy  = opt?.dataset?.hocky || '';
                const thu    = thuSelect.value;
                const tiet   = tietSelect.value;
                const soTiet = soTietSelect.value;

                if (!hocKy) { alert('Vui lòng chọn lớp học phần để xác định học kỳ'); return; }

                btnTim.disabled = true;
                btnTim.innerHTML = '<i class="fas fa-spinner fa-spin me-1"></i>Đang tìm...';

                const resultEl = document.getElementById('phongTrongResult');
                const emptyEl  = document.getElementById('phongTrongEmpty');
                const itemsEl  = document.getElementById('phongTrongItems');
                const countEl  = document.getElementById('phongTrongCount');
                resultEl.style.display = 'none';
                emptyEl.style.display  = 'none';

                try {
                    const url = `/tkb/phong-trong?hocKy=${encodeURIComponent(hocKy)}&thu=${thu}&tietBatDau=${tiet}&soTiet=${soTiet}`;
                    const res  = await fetch(url);
                    const data = await res.json();

                    if (data.length === 0) { emptyEl.style.display = ''; return; }

                    countEl.textContent = data.length + ' phòng';
                    itemsEl.innerHTML = '';
                    data.forEach(p => {
                        const btn = document.createElement('button');
                        btn.type = 'button';
                        btn.className = 'room-btn';
                        btn.innerHTML = '<i class="fas fa-door-open"></i>' + p.maPhong +
                            ' <span class="cap">(' + p.sucChua + ' chỗ)</span>';
                        btn.onclick = () => {
                            phongSelect.value = p.maPhong;
                            itemsEl.querySelectorAll('.room-btn').forEach(b => b.classList.remove('selected'));
                            btn.classList.add('selected');
                        };
                        itemsEl.appendChild(btn);
                    });
                    resultEl.style.display = '';
                } catch (e) {
                    alert('Lỗi khi tìm phòng: ' + e.message);
                } finally {
                    btnTim.disabled = false;
                    btnTim.innerHTML = '<i class="fas fa-search me-1"></i>Tìm phòng trống';
                }
            });

            // Reset phòng khi đổi thứ/tiết
            [thuSelect, tietSelect, soTietSelect].forEach(el =>
                el.addEventListener('change', () => {
                    document.getElementById('phongTrongResult').style.display = 'none';
                    document.getElementById('phongTrongEmpty').style.display  = 'none';
                })
            );
        })();
    </script>

</th:block></body></html>
