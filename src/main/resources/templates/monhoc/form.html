<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: layout(~{::content}, 'Thêm/Sửa Môn học')}">
<body><th:block th:fragment="content">
<div class="card" style="max-width:620px;margin:0 auto">
  <div class="card-header">
    <i class="fas fa-book me-2"></i>
    <span th:text="${monHoc.id==null?'Thêm Môn học mới':'Cập nhật Môn học'}"></span>
  </div>
  <div class="card-body p-4">
    <form th:action="${monHoc.id==null?'/admin/mon-hoc/them':'/admin/mon-hoc/sua/'+monHoc.id}"
          th:object="${monHoc}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label fw-semibold">Mã môn học <span class="text-danger">*</span></label>
          <input type="text" class="form-control" th:field="*{maMon}"
                 th:readonly="${monHoc.id!=null}" placeholder="VD: LTJAVA"/>
          <div class="text-danger small mt-1" th:errors="*{maMon}"></div>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-semibold">Số tín chỉ <span class="text-danger">*</span></label>
          <input type="number" class="form-control" th:field="*{soTinChi}" min="1" max="10"/>
          <div class="text-danger small mt-1" th:errors="*{soTinChi}"></div>
        </div>
        <div class="col-12">
          <label class="form-label fw-semibold">Tên môn học <span class="text-danger">*</span></label>
          <input type="text" class="form-control" th:field="*{tenMon}" placeholder="VD: Lập Trình Java"/>
          <div class="text-danger small mt-1" th:errors="*{tenMon}"></div>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-semibold">Loại môn</label>
          <select class="form-select" th:field="*{loaiMon}">
            <option th:each="lm:${loaiMons}" th:value="${lm}" th:text="${lm}"></option>
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-semibold">Khoa</label>
          <select class="form-select" th:field="*{khoa.id}">
            <option value="">-- Chọn khoa --</option>
            <option th:each="k:${khoas}" th:value="${k.id}" th:text="${k.tenKhoa}"></option>
          </select>
        </div>
        <div class="col-12">
          <label class="form-label fw-semibold">Mô tả</label>
          <textarea class="form-control" th:field="*{moTa}" rows="3"
                    placeholder="Mô tả nội dung môn học..."></textarea>
        </div>
        <div class="col-12 d-flex gap-2 justify-content-end mt-2 border-top pt-3">
          <a th:href="@{/admin/mon-hoc}" class="btn btn-secondary">
            <i class="fas fa-arrow-left me-1"></i>Quay lại</a>
          <button type="submit" class="btn btn-warning">
            <i class="fas fa-save me-1"></i>
            <span th:text="${monHoc.id==null?'Thêm mới':'Cập nhật'}"></span>
          </button>
        </div>
      </div>
    </form>
  </div>
</div>
</th:block></body></html>
