<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: layout(~{::content}, 'Quản lý Môn học')}">
<body><th:block th:fragment="content">
<div class="card">
  <div class="card-header d-flex justify-content-between align-items-center">
    <span><i class="fas fa-book me-2"></i>Danh sách Môn học</span>
    <a th:href="@{/admin/mon-hoc/them}" class="btn btn-warning btn-sm"><i class="fas fa-plus me-1"></i>Thêm mới</a>
  </div>
  <div class="card-body">
    <form method="get" class="d-flex gap-2 mb-3">
      <input type="text" name="search" class="form-control" placeholder="🔍 Tìm theo tên môn..." th:value="${search}"/>
      <button class="btn btn-outline-warning px-4">Tìm</button>
      <a th:href="@{/admin/mon-hoc}" class="btn btn-outline-secondary">Reset</a>
    </form>
    <div class="table-responsive">
      <table class="table table-hover align-middle">
        <thead><tr><th>#</th><th>Mã môn</th><th>Tên môn học</th><th>Tín chỉ</th><th>Loại</th><th>Khoa</th><th>Thao tác</th></tr></thead>
        <tbody>
          <tr th:if="${#lists.isEmpty(monHocs)}">
            <td colspan="7" class="text-center text-muted py-4"><i class="fas fa-inbox fa-2x d-block mb-2"></i>Không có dữ liệu</td>
          </tr>
          <tr th:each="mon,i : ${monHocs}">
            <td th:text="${i.count}"></td>
            <td><code th:text="${mon.maMon}"></code></td>
            <td class="fw-semibold" th:text="${mon.tenMon}"></td>
            <td><span class="badge bg-warning text-dark" th:text="${mon.soTinChi}+' TC'"></span></td>
            <td>
              <span class="badge"
                    th:classappend="${mon.loaiMon.name()=='LY_THUYET'?'bg-primary':mon.loaiMon.name()=='THUC_HANH'?'bg-success':'bg-secondary'}"
                    th:text="${mon.loaiMon}"></span>
            </td>
            <td class="small" th:text="${mon.khoa?.tenKhoa ?: '-'}"></td>
            <td>
              <a th:href="@{/admin/mon-hoc/sua/{id}(id=${mon.id})}" class="btn btn-sm btn-outline-warning"><i class="fas fa-edit"></i></a>
              <form th:action="@{/admin/mon-hoc/xoa/{id}(id=${mon.id})}" method="post" class="d-inline"
                    onsubmit="return confirm('Xác nhận xóa môn học này?')">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button class="btn btn-sm btn-outline-danger ms-1"><i class="fas fa-trash"></i></button>
              </form>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
</th:block></body></html>
