
services:
  mysql:
    image: mysql:8.0
    container_name: qldt_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: qldt_db
    ports:
      - "3307:3306"

  app:
    build: .
    container_name: qldt_app
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - mysql