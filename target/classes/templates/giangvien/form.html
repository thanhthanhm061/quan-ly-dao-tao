<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: layout(~{::content}, 'Thêm/Sửa Giảng viên')}">
<body><th:block th:fragment="content">
<div class="card" style="max-width:720px;margin:0 auto">
  <div class="card-header">
    <i class="fas fa-chalkboard-teacher me-2"></i>
    <span th:text="${giangVien.id==null?'Thêm Giảng viên mới':'Cập nhật Giảng viên'}"></span>
  </div>
  <div class="card-body p-4">
    <form th:action="${giangVien.id==null?'/admin/giang-vien/them':'/admin/giang-vien/sua/'+giangVien.id}"
          th:object="${giangVien}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label fw-semibold">Mã giảng viên <span class="text-danger">*</span></label>
          <input type="text" class="form-control" th:field="*{maGv}"
                 th:readonly="${giangVien.id!=null}" placeholder="VD: GV001"/>
          <div class="text-danger small mt-1" th:errors="*{maGv}"></div>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-semibold">Họ và tên <span class="text-danger">*</span></label>
          <input type="text" class="form-control" th:field="*{hoTen}" placeholder="Nguyễn Văn A"/>
          <div class="text-danger small mt-1" th:errors="*{hoTen}"></div>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-semibold">Học vị</label>
          <select class="form-select" th:field="*{hocVi}">
            <option value="">-- Chọn học vị --</option>
            <option th:each="hv:${hocVis}" th:value="${hv}" th:text="${hv}"></option>
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-semibold">Chuyên ngành</label>
          <input type="text" class="form-control" th:field="*{chuyenNganh}" placeholder="Công nghệ thông tin"/>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-semibold">Email</label>
          <input type="email" class="form-control" th:field="*{email}" placeholder="email@example.com"/>
          <div class="text-danger small mt-1" th:errors="*{email}"></div>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-semibold">Số điện thoại</label>
          <input type="text" class="form-control" th:field="*{soDienThoai}" placeholder="0901234567"/>
        </div>
        <div class="col-12">
          <label class="form-label fw-semibold">Khoa</label>
          <select class="form-select" th:field="*{khoa.id}">
            <option value="">-- Chọn khoa --</option>
            <option th:each="k:${khoas}" th:value="${k.id}" th:text="${k.tenKhoa}"></option>
          </select>
        </div>
        <div class="col-12 d-flex gap-2 justify-content-end mt-2 border-top pt-3">
          <a th:href="@{/admin/giang-vien}" class="btn btn-secondary">
            <i class="fas fa-arrow-left me-1"></i>Quay lại</a>
          <button type="submit" class="btn btn-success">
            <i class="fas fa-save me-1"></i>
            <span th:text="${giangVien.id==null?'Thêm mới':'Cập nhật'}"></span>
          </button>
        </div>
      </div>
    </form>
  </div>
</div>
</th:block></body></html>
