<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: layout(~{::content}, 'Danh sách sinh viên lớp học phần')}">
<body><th:block th:fragment="content">

<div class="card mb-4">
  <div class="card-body p-3 d-flex align-items-center gap-3">
    <div>
      <h6 class="fw-bold mb-0" th:text="${lopHocPhan.maLhp}"></h6>
      <span class="text-muted small" th:text="${lopHocPhan.monHoc.tenMon}+' | '+${lopHocPhan.hocKy}"></span>
    </div>
    <span class="ms-auto badge bg-primary" th:text="${#lists.size(dangKys)}+' sinh viên'"></span>
  </div>
</div>

<div class="card">
  <div class="card-header"><i class="fas fa-users me-2"></i>Danh sách & Cập nhật điểm</div>
  <div class="card-body p-0">
    <table class="table table-hover mb-0 align-middle">
      <thead>
        <tr>
          <th>#</th><th>Mã SV</th><th>Họ tên</th>
          <th class="text-center">Điểm QT (30%)</th>
          <th class="text-center">Điểm thi (70%)</th>
          <th class="text-center">Tổng kết</th>
          <th class="text-center">Xếp loại</th>
          <th>Cập nhật</th>
        </tr>
      </thead>
      <tbody>
        <tr th:if="${#lists.isEmpty(dangKys)}">
          <td colspan="8" class="text-center py-4 text-muted">Chưa có sinh viên đăng ký</td>
        </tr>
        <tr th:each="dk,i : ${dangKys}">
          <td th:text="${i.count}"></td>
          <td><code th:text="${dk.sinhVien.maSv}"></code></td>
          <td class="fw-semibold" th:text="${dk.sinhVien.hoTen}"></td>
          <td class="text-center" th:text="${dk.diemQuaTrinh != null ? #numbers.formatDecimal(dk.diemQuaTrinh,1,1) : '-'}"></td>
          <td class="text-center" th:text="${dk.diemThi != null ? #numbers.formatDecimal(dk.diemThi,1,1) : '-'}"></td>
          <td class="text-center fw-bold">
            <span th:if="${dk.diemTongKet != null}"
                  th:classappend="${dk.dat ? 'text-success' : 'text-danger'}"
                  th:text="${#numbers.formatDecimal(dk.diemTongKet,1,2)}"></span>
            <span th:unless="${dk.diemTongKet != null}" class="text-muted">-</span>
          </td>
          <td class="text-center">
            <span class="badge" th:classappend="${dk.dat ? 'bg-success' : (dk.diemTongKet != null ? 'bg-danger' : 'bg-secondary')}"
                  th:text="${dk.xepLoai}"></span>
          </td>
          <td>
            <button class="btn btn-sm btn-outline-primary" type="button"
                    th:attr="data-bs-toggle='modal',data-bs-target='#modalDiem',
                             data-dkid=${dk.id},data-lhpid=${lopHocPhan.id},
                             data-qt=${dk.diemQuaTrinh ?: ''},data-thi=${dk.diemThi ?: ''},
                             data-ten=${dk.sinhVien.hoTen}">
              <i class="fas fa-pencil-alt"></i>
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<div class="mt-3">
  <a th:href="@{/giangvien/dashboard}" class="btn btn-secondary">
    <i class="fas fa-arrow-left me-1"></i>Quay lại
  </a>
</div>

<!-- Modal cập nhật điểm -->
<div class="modal fade" id="modalDiem" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0 shadow">
      <div class="modal-header bg-primary text-white">
        <h5 class="modal-title"><i class="fas fa-star me-2"></i>Cập nhật điểm</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <form th:action="@{/giangvien/cap-nhat-diem}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <input type="hidden" id="dkId" name="dkId"/>
        <input type="hidden" id="lhpId" name="lhpId"/>
        <div class="modal-body p-4">
          <p class="mb-3"><strong>Sinh viên: </strong><span id="tenSV" class="text-primary"></span></p>
          <div class="mb-3">
            <label class="form-label fw-semibold">Điểm quá trình (0 - 10)</label>
            <input type="number" class="form-control" id="diemQT" name="diemQT"
                   min="0" max="10" step="0.1" placeholder="VD: 8.5"/>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Điểm thi (0 - 10)</label>
            <input type="number" class="form-control" id="diemThi" name="diemThi"
                   min="0" max="10" step="0.1" placeholder="VD: 7.0"/>
          </div>
          <div class="alert alert-info small p-2">
            <i class="fas fa-info-circle me-1"></i>
            Điểm tổng kết = Quá trình × 30% + Thi × 70%
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
          <button type="submit" class="btn btn-primary"><i class="fas fa-save me-1"></i>Lưu điểm</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script>
document.getElementById('modalDiem').addEventListener('show.bs.modal', function(e) {
  const btn = e.relatedTarget;
  document.getElementById('dkId').value   = btn.dataset.dkid;
  document.getElementById('lhpId').value  = btn.dataset.lhpid;
  document.getElementById('diemQT').value = btn.dataset.qt;
  document.getElementById('diemThi').value= btn.dataset.thi;
  document.getElementById('tenSV').textContent = btn.dataset.ten;
});
</script>
</th:block></body></html>
