<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: layout(~{::content}, 'Đăng ký học phần')}">
<body><th:block th:fragment="content">
<div class="card">
  <div class="card-header"><i class="fas fa-plus-circle me-2"></i>Đăng ký học phần</div>
  <div class="card-body">
    <form method="get" class="d-flex gap-2 mb-4 align-items-center">
      <label class="fw-semibold me-2">Chọn học kỳ:</label>
      <select name="hocKy" class="form-select" style="width:200px" onchange="this.form.submit()">
        <option value="">-- Chọn học kỳ --</option>
        <option th:each="hk:${danhSachHocKy}" th:value="${hk}" th:text="${hk}"
                th:selected="${hk==hocKyChon}"></option>
      </select>
    </form>
    <div th:if="${lopHocPhans != null}">
      <div th:if="${#lists.isEmpty(lopHocPhans)}" class="text-center text-muted py-4">
        <i class="fas fa-inbox fa-2x d-block mb-2"></i>Không có lớp học phần nào trong học kỳ này
      </div>
      <div class="table-responsive" th:unless="${#lists.isEmpty(lopHocPhans)}">
        <table class="table table-hover align-middle">
          <thead><tr>
            <th>Mã LHP</th><th>Môn học</th><th>Tín chỉ</th>
            <th>Giảng viên</th><th>Sĩ số</th><th>Trạng thái</th><th>Đăng ký</th>
          </tr></thead>
          <tbody>
            <tr th:each="lhp : ${lopHocPhans}">
              <td><code th:text="${lhp.maLhp}"></code></td>
              <td class="fw-semibold" th:text="${lhp.monHoc.tenMon}"></td>
              <td><span class="badge bg-warning text-dark" th:text="${lhp.monHoc.soTinChi}+' TC'"></span></td>
              <td th:text="${lhp.giangVien.hoTen}"></td>
              <td>
                <span th:text="${lhp.siSoHienTai+'/'+lhp.siSoMax}"></span>
                <div class="progress mt-1" style="height:4px;width:80px">
                  <div class="progress-bar" th:classappend="${lhp.conCho?'bg-success':'bg-danger'}"
                       th:style="'width:'+${lhp.siSoHienTai*100/lhp.siSoMax}+'%'"></div>
                </div>
              </td>
              <td>
                <span class="badge" th:classappend="${lhp.trangThai.name()=='MO'?'bg-success':'bg-secondary'}"
                      th:text="${lhp.trangThai}"></span>
              </td>
              <td>
                <span th:if="${daDangKy != null and daDangKy.contains(lhp.id)}"
                      class="badge bg-primary py-2 px-3"><i class="fas fa-check me-1"></i>Đã đăng ký</span>
                <form th:unless="${daDangKy != null and daDangKy.contains(lhp.id)}"
                      th:action="@{/sinhvien/dang-ky}" method="post" class="d-inline">
                  <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                  <input type="hidden" name="lhpId" th:value="${lhp.id}"/>
                  <input type="hidden" name="hocKy" th:value="${hocKyChon}"/>
                  <button class="btn btn-sm btn-primary" th:disabled="${!lhp.conCho or lhp.trangThai.name()!='MO'}">
                    <i class="fas fa-plus me-1"></i>Đăng ký
                  </button>
                </form>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
    <div th:unless="${hocKyChon != null}" class="text-center text-muted py-5">
      <i class="fas fa-calendar-alt fa-3x mb-3 d-block"></i>
      Vui lòng chọn học kỳ để xem danh sách lớp học phần
    </div>
  </div>
</div>
</th:block></body></html>
