<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: layout(~{::content}, 'Tổng quan Sinh viên')}">
<body><th:block th:fragment="content">
<div class="row g-4 mb-4">
  <div class="col-md-4">
    <div class="stat-card text-center">
      <div class="stat-icon mx-auto mb-3" style="background:#dbeafe;color:#1d4ed8"><i class="fas fa-book-open"></i></div>
      <h3 class="fw-bold" th:text="${#lists.size(dangKys)}">0</h3>
      <p class="text-muted mb-2">Học phần đã đăng ký</p>
      <a th:href="@{/sinhvien/dang-ky}" class="btn btn-primary btn-sm">
        <i class="fas fa-plus me-1"></i>Đăng ký thêm</a>
    </div>
  </div>
  <div class="col-md-8">
    <div class="card h-100">
      <div class="card-header"><i class="fas fa-list me-2"></i>Kết quả học tập</div>
      <div class="card-body p-0">
        <table class="table table-hover mb-0 align-middle">
          <thead><tr><th>Môn học</th><th>Giảng viên</th><th>Học kỳ</th><th>Điểm TK</th><th>Xếp loại</th><th></th></tr></thead>
          <tbody>
            <tr th:if="${#lists.isEmpty(dangKys)}">
              <td colspan="6" class="text-center py-4 text-muted">Chưa đăng ký học phần nào</td>
            </tr>
            <tr th:each="dk : ${dangKys}">
              <td class="fw-semibold small" th:text="${dk.lopHocPhan.monHoc.tenMon}"></td>
              <td class="small" th:text="${dk.lopHocPhan.giangVien.hoTen}"></td>
              <td><span class="badge bg-info text-dark" th:text="${dk.lopHocPhan.hocKy}"></span></td>
              <td class="fw-bold" th:text="${dk.diemTongKet != null ? #numbers.formatDecimal(dk.diemTongKet,1,2) : '-'}"></td>
              <td>
                <span class="badge" th:classappend="${dk.dat ? 'bg-success' : 'bg-danger'}"
                      th:text="${dk.xepLoai}"></span>
              </td>
              <td>
                <form th:action="@{/sinhvien/huy-dang-ky}" method="post" class="d-inline"
                      onsubmit="return confirm('Hủy đăng ký học phần này?')">
                  <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                  <input type="hidden" name="lhpId" th:value="${dk.lopHocPhan.id}"/>
                  <button class="btn btn-sm btn-outline-danger" th:if="${dk.diemTongKet == null}">Hủy</button>
                </form>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
<div class="d-flex gap-2">
  <a th:href="@{/sinhvien/dang-ky}" class="btn btn-primary"><i class="fas fa-plus me-1"></i>Đăng ký học phần</a>
  <a th:href="@{/tkb/cua-toi}" class="btn btn-outline-primary"><i class="fas fa-calendar me-1"></i>Xem thời khóa biểu</a>
</div>
</th:block></body></html>
