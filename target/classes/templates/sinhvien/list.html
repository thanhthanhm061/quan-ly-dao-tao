<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: layout(~{::content}, 'Quản lý Sinh viên')}">
<body><th:block th:fragment="content">
<div class="card">
  <div class="card-header d-flex justify-content-between align-items-center">
    <span><i class="fas fa-user-graduate me-2"></i>Danh sách Sinh viên
      <span class="badge bg-primary ms-1" th:text="${tongSo}">0</span></span>
    <a th:href="@{/admin/sinh-vien/them}" class="btn btn-primary btn-sm"><i class="fas fa-plus me-1"></i>Thêm mới</a>
  </div>
  <div class="card-body">
    <form method="get" class="d-flex gap-2 mb-3">
      <input type="text" name="search" class="form-control" placeholder="🔍 Tìm theo tên, mã SV..." th:value="${search}"/>
      <button class="btn btn-outline-primary px-4">Tìm</button>
      <a th:href="@{/admin/sinh-vien}" class="btn btn-outline-secondary">Reset</a>
    </form>
    <div class="table-responsive">
      <table class="table table-hover align-middle">
        <thead><tr><th>#</th><th>Mã SV</th><th>Họ tên</th><th>Giới tính</th><th>Lớp</th><th>Email</th><th>Trạng thái</th><th>Thao tác</th></tr></thead>
        <tbody>
          <tr th:if="${#lists.isEmpty(sinhViens)}">
            <td colspan="8" class="text-center text-muted py-4"><i class="fas fa-inbox fa-2x d-block mb-2"></i>Không có dữ liệu</td>
          </tr>
          <tr th:each="sv,i : ${sinhViens}">
            <td th:text="${i.count}"></td>
            <td><code th:text="${sv.maSv}"></code></td>
            <td class="fw-semibold" th:text="${sv.hoTen}"></td>
            <td th:text="${sv.gioiTinh}"></td>
            <td><span class="badge bg-light text-dark border" th:text="${sv.lop?.maLop ?: '-'}"></span></td>
            <td class="small text-muted" th:text="${sv.email ?: '-'}"></td>
            <td>
              <span class="badge"
                    th:classappend="${sv.trangThai != null and sv.trangThai.name()=='DANG_HOC'?'bg-success':'bg-secondary'}"
                    th:text="${sv.trangThai != null ? sv.trangThai : ''}"></span>
            </td>
            <td>
              <a th:href="@{/admin/sinh-vien/sua/{id}(id=${sv.id})}" class="btn btn-sm btn-outline-warning">
                <i class="fas fa-edit"></i></a>
              <form th:action="@{/admin/sinh-vien/xoa/{id}(id=${sv.id})}" method="post" class="d-inline"
                    onsubmit="return confirm('Xác nhận xóa sinh viên này?')">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button class="btn btn-sm btn-outline-danger ms-1"><i class="fas fa-trash"></i></button>
              </form>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
</th:block></body></html>
