<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: layout(~{::content}, 'Danh sách đăng ký lớp học phần')}">
<body><th:block th:fragment="content">

<div class="card mb-4 border-start border-danger border-4">
  <div class="card-body p-3">
    <div class="row">
      <div class="col-md-3"><span class="text-muted small">Mã LHP</span><br><strong th:text="${lopHocPhan.maLhp}"></strong></div>
      <div class="col-md-3"><span class="text-muted small">Môn học</span><br><strong th:text="${lopHocPhan.monHoc.tenMon}"></strong></div>
      <div class="col-md-2"><span class="text-muted small">Học kỳ</span><br><span class="badge bg-info text-dark" th:text="${lopHocPhan.hocKy}"></span></div>
      <div class="col-md-2"><span class="text-muted small">Giảng viên</span><br><span th:text="${lopHocPhan.giangVien.hoTen}"></span></div>
      <div class="col-md-2"><span class="text-muted small">Sĩ số</span><br>
        <strong th:text="${lopHocPhan.siSoHienTai}"></strong><span class="text-muted" th:text="'/'+${lopHocPhan.siSoMax}"></span></div>
    </div>
  </div>
</div>

<div class="card">
  <div class="card-header d-flex justify-content-between align-items-center">
    <span><i class="fas fa-users me-2"></i>Danh sách sinh viên đăng ký</span>
    <span class="badge bg-danger" th:text="${#lists.size(dangKys)}+' SV'"></span>
  </div>
  <div class="card-body p-0">
    <table class="table table-hover mb-0 align-middle">
      <thead>
        <tr>
          <th>#</th><th>Mã SV</th><th>Họ tên</th>
          <th class="text-center">Điểm QT</th>
          <th class="text-center">Điểm thi</th>
          <th class="text-center">Tổng kết</th>
          <th class="text-center">Xếp loại</th>
          <th class="text-center">Cập nhật</th>
        </tr>
      </thead>
      <tbody>
        <tr th:if="${#lists.isEmpty(dangKys)}">
          <td colspan="8" class="text-center py-4 text-muted">Chưa có sinh viên đăng ký</td>
        </tr>
        <tr th:each="dk,i : ${dangKys}">
          <td th:text="${i.count}"></td>
          <td><code th:text="${dk.sinhVien.maSv}"></code></td>
          <td class="fw-semibold" th:text="${dk.sinhVien.hoTen}"></td>
          <td class="text-center" th:text="${dk.diemQuaTrinh != null ? #numbers.formatDecimal(dk.diemQuaTrinh,1,1) : '-'}"></td>
          <td class="text-center" th:text="${dk.diemThi != null ? #numbers.formatDecimal(dk.diemThi,1,1) : '-'}"></td>
          <td class="text-center fw-bold">
            <span th:if="${dk.diemTongKet != null}"
                  th:classappend="${dk.dat ? 'text-success' : 'text-danger'}"
                  th:text="${#numbers.formatDecimal(dk.diemTongKet,1,2)}"></span>
            <span th:unless="${dk.diemTongKet != null}" class="text-muted">-</span>
          </td>
          <td class="text-center">
            <span class="badge"
                  th:classappend="${dk.dat ? 'bg-success' : dk.diemTongKet != null ? 'bg-danger' : 'bg-secondary'}"
                  th:text="${dk.xepLoai}"></span>
          </td>
          <td class="text-center">
            <button class="btn btn-sm btn-outline-primary" type="button"
                    data-bs-toggle="modal" data-bs-target="#modalDiem"
                    th:attr="data-dkid=${dk.id}, data-lhpid=${lopHocPhan.id},
                             data-qt=${dk.diemQuaTrinh ?: ''}, data-thi=${dk.diemThi ?: ''},
                             data-ten=${dk.sinhVien.hoTen}">
              <i class="fas fa-pencil-alt"></i>
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<div class="mt-3">
  <a th:href="@{/admin/lop-hoc-phan}" class="btn btn-secondary">
    <i class="fas fa-arrow-left me-1"></i>Quay lại</a>
</div>

<!-- Modal điểm -->
<div class="modal fade" id="modalDiem" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0 shadow">
      <div class="modal-header" style="background:linear-gradient(135deg,#1e3a5f,#2563eb)">
        <h5 class="modal-title text-white"><i class="fas fa-star me-2"></i>Cập nhật điểm số</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <form th:action="@{/admin/lop-hoc-phan/cap-nhat-diem}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <input type="hidden" id="dkId"  name="dkId"/>
        <input type="hidden" id="lhpId" name="lhpId"/>
        <div class="modal-body p-4">
          <p class="fw-semibold mb-3">Sinh viên: <span id="tenSV" class="text-primary"></span></p>
          <div class="mb-3">
            <label class="form-label fw-semibold">Điểm quá trình <span class="text-muted small">(0 - 10, hệ số 30%)</span></label>
            <input type="number" class="form-control" id="diemQT" name="diemQT"
                   min="0" max="10" step="0.1" placeholder="VD: 8.5"/>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Điểm thi <span class="text-muted small">(0 - 10, hệ số 70%)</span></label>
            <input type="number" class="form-control" id="diemThi" name="diemThi"
                   min="0" max="10" step="0.1" placeholder="VD: 7.0"/>
          </div>
          <div class="alert alert-light border small p-2 mb-0">
            <i class="fas fa-calculator me-1 text-primary"></i>
            Tổng kết = QT × 0.3 + Thi × 0.7 &nbsp;|&nbsp; Đạt khi ≥ 4.0
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Hủy</button>
          <button type="submit" class="btn btn-primary"><i class="fas fa-save me-1"></i>Lưu điểm</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script>
document.getElementById('modalDiem').addEventListener('show.bs.modal', function(e) {
  const b = e.relatedTarget;
  document.getElementById('dkId').value    = b.dataset.dkid;
  document.getElementById('lhpId').value   = b.dataset.lhpid;
  document.getElementById('diemQT').value  = b.dataset.qt;
  document.getElementById('diemThi').value = b.dataset.thi;
  document.getElementById('tenSV').textContent = b.dataset.ten;
});
</script>
</th:block></body></html>
