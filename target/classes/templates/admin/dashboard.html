<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layout/base :: layout(~{::content}, 'Tổng quan')}">
<body>
<th:block th:fragment="content">

<div class="row g-4 mb-4">
  <div class="col-md-4 col-lg">
    <div class="stat-card">
      <div class="d-flex justify-content-between align-items-start">
        <div>
          <p class="text-muted small mb-1">Tổng sinh viên</p>
          <h3 class="fw-bold mb-0" th:text="${tongSV}">0</h3>
        </div>
        <div class="stat-icon" style="background:#dbeafe;color:#1d4ed8"><i class="fas fa-user-graduate"></i></div>
      </div>
      <a th:href="@{/admin/sinh-vien}" class="btn btn-sm btn-outline-primary mt-3">Xem danh sách</a>
    </div>
  </div>
  <div class="col-md-4 col-lg">
    <div class="stat-card">
      <div class="d-flex justify-content-between align-items-start">
        <div>
          <p class="text-muted small mb-1">Tổng giảng viên</p>
          <h3 class="fw-bold mb-0" th:text="${tongGV}">0</h3>
        </div>
        <div class="stat-icon" style="background:#d1fae5;color:#059669"><i class="fas fa-chalkboard-teacher"></i></div>
      </div>
      <a th:href="@{/admin/giang-vien}" class="btn btn-sm btn-outline-success mt-3">Xem danh sách</a>
    </div>
  </div>
  <div class="col-md-4 col-lg">
    <div class="stat-card">
      <div class="d-flex justify-content-between align-items-start">
        <div>
          <p class="text-muted small mb-1">Tổng môn học</p>
          <h3 class="fw-bold mb-0" th:text="${tongMon}">0</h3>
        </div>
        <div class="stat-icon" style="background:#fef3c7;color:#d97706"><i class="fas fa-book"></i></div>
      </div>
      <a th:href="@{/admin/mon-hoc}" class="btn btn-sm btn-outline-warning mt-3">Xem danh sách</a>
    </div>
  </div>
  <div class="col-md-4 col-lg">
    <div class="stat-card">
      <div class="d-flex justify-content-between align-items-start">
        <div>
          <p class="text-muted small mb-1">Tổng lớp</p>
          <h3 class="fw-bold mb-0" th:text="${tongLop}">0</h3>
        </div>
        <div class="stat-icon" style="background:#ede9fe;color:#7c3aed"><i class="fas fa-door-open"></i></div>
      </div>
      <a th:href="@{/admin/lop}" class="btn btn-sm btn-outline-secondary mt-3">Xem danh sách</a>
    </div>
  </div>
  <div class="col-md-4 col-lg">
    <div class="stat-card">
      <div class="d-flex justify-content-between align-items-start">
        <div>
          <p class="text-muted small mb-1">Lớp học phần</p>
          <h3 class="fw-bold mb-0" th:text="${tongLHP}">0</h3>
        </div>
        <div class="stat-icon" style="background:#fee2e2;color:#dc2626"><i class="fas fa-clipboard-list"></i></div>
      </div>
      <a th:href="@{/admin/lop-hoc-phan}" class="btn btn-sm btn-outline-danger mt-3">Xem danh sách</a>
    </div>
  </div>
</div>

<!-- Quick Actions -->
<div class="card">
  <div class="card-header"><i class="fas fa-bolt me-2"></i>Thao tác nhanh</div>
  <div class="card-body">
    <div class="row g-3">
      <div class="col-md-3">
        <a th:href="@{/admin/sinh-vien/them}" class="btn btn-primary w-100">
          <i class="fas fa-plus me-2"></i>Thêm sinh viên
        </a>
      </div>
      <div class="col-md-3">
        <a th:href="@{/admin/giang-vien/them}" class="btn btn-success w-100">
          <i class="fas fa-plus me-2"></i>Thêm giảng viên
        </a>
      </div>
      <div class="col-md-3">
        <a th:href="@{/admin/lop-hoc-phan/them}" class="btn btn-warning w-100">
          <i class="fas fa-plus me-2"></i>Mở lớp học phần
        </a>
      </div>
      <div class="col-md-3">
        <a th:href="@{/tkb/them}" class="btn btn-info w-100 text-white">
          <i class="fas fa-calendar-plus me-2"></i>Thêm thời khóa biểu
        </a>
      </div>
    </div>
  </div>
</div>

</th:block>
</body>
</html>
