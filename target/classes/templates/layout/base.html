<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:fragment="layout(content, pageTitle)">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title th:text="${pageTitle} + ' - QLĐT'">QLĐT</title>
  <link th:href="@{/webjars/bootstrap/5.3.2/css/bootstrap.min.css}" rel="stylesheet"/>
  <link th:href="@{/webjars/font-awesome/6.4.2/css/all.min.css}" rel="stylesheet"/>
  <style>
    body{background:#f0f2f5;font-family:'Segoe UI',sans-serif}
    .sidebar{min-height:100vh;background:linear-gradient(180deg,#1e3a5f 0%,#2c5282 100%);width:230px;position:fixed;top:0;left:0;z-index:100;padding-top:15px}
    .sidebar .nav-link{color:rgba(255,255,255,.75);padding:10px 20px;border-radius:6px;margin:2px 8px;transition:.2s;font-size:.9rem}
    .sidebar .nav-link:hover,.sidebar .nav-link.active{color:#fff;background:rgba(255,255,255,.15)}
    .sidebar .nav-link i{width:22px;margin-right:8px}
    .sidebar-brand{color:#fff;font-size:1rem;font-weight:700;padding:8px 20px 15px;border-bottom:1px solid rgba(255,255,255,.1);margin-bottom:8px;display:block}
    .main-content{margin-left:230px;padding:20px}
    .topbar{background:#fff;border-radius:10px;padding:12px 20px;margin-bottom:20px;box-shadow:0 1px 3px rgba(0,0,0,.08);display:flex;justify-content:space-between;align-items:center}
    .card{border:none;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
    .card-header{background:#fff;border-bottom:1px solid #e2e8f0;border-radius:12px 12px 0 0!important;font-weight:600;padding:15px 20px}
    .table th{background:#f8fafc;font-weight:600;font-size:.8rem;text-transform:uppercase;color:#4a5568}
    .stat-card{background:#fff;border-radius:12px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
    .stat-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.3rem}
    .nav-section{font-size:.68rem;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,.4);padding:8px 20px 3px}
    .logout-btn{position:absolute;bottom:15px;width:100%;padding:0 8px}
  </style>
</head>
<body>
<div class="sidebar">
  <a class="sidebar-brand" th:href="@{/}"><i class="fas fa-graduation-cap me-2"></i>QLĐÀO TẠO</a>
  <nav class="nav flex-column">
    <div sec:authorize="hasRole('ADMIN')">
      <div class="nav-section">Quản lý</div>
      <a class="nav-link" th:href="@{/admin/dashboard}"><i class="fas fa-tachometer-alt"></i>Tổng quan</a>
      <a class="nav-link" th:href="@{/admin/sinh-vien}"><i class="fas fa-user-graduate"></i>Sinh viên</a>
      <a class="nav-link" th:href="@{/admin/giang-vien}"><i class="fas fa-chalkboard-teacher"></i>Giảng viên</a>
      <a class="nav-link" th:href="@{/admin/mon-hoc}"><i class="fas fa-book"></i>Môn học</a>
      <a class="nav-link" th:href="@{/admin/lop}"><i class="fas fa-door-open"></i>Lớp học</a>
      <a class="nav-link" th:href="@{/admin/lop-hoc-phan}"><i class="fas fa-clipboard-list"></i>Lớp học phần</a>
      <div class="nav-section">Học vụ</div>
      <a class="nav-link" th:href="@{/tkb}"><i class="fas fa-calendar-alt"></i>Thời khóa biểu</a>
    </div>
    <div sec:authorize="hasRole('GIANG_VIEN')">
      <a class="nav-link" th:href="@{/giangvien/dashboard}"><i class="fas fa-tachometer-alt"></i>Tổng quan</a>
      <a class="nav-link" th:href="@{/tkb/cua-toi}"><i class="fas fa-calendar-alt"></i>Thời khóa biểu</a>
    </div>
    <div sec:authorize="hasRole('SINH_VIEN')">
      <a class="nav-link" th:href="@{/sinhvien/dashboard}"><i class="fas fa-tachometer-alt"></i>Tổng quan</a>
      <a class="nav-link" th:href="@{/sinhvien/dang-ky}"><i class="fas fa-plus-circle"></i>Đăng ký học phần</a>
      <a class="nav-link" th:href="@{/tkb/cua-toi}"><i class="fas fa-calendar-alt"></i>Thời khóa biểu</a>
    </div>
  </nav>
  <div class="logout-btn">
    <form th:action="@{/logout}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <button class="btn btn-danger btn-sm w-100"><i class="fas fa-sign-out-alt me-1"></i>Đăng xuất</button>
    </form>
  </div>
</div>
<div class="main-content">
  <div class="topbar">
    <h6 class="mb-0 fw-bold" th:text="${pageTitle}">Dashboard</h6>
    <div class="d-flex align-items-center gap-2">
      <i class="fas fa-user-circle text-muted"></i>
      <span class="small text-muted" sec:authentication="name">User</span>
      <span class="badge bg-danger" sec:authorize="hasRole('ADMIN')">Admin</span>
      <span class="badge bg-success" sec:authorize="hasRole('GIANG_VIEN')">Giảng viên</span>
      <span class="badge bg-primary" sec:authorize="hasRole('SINH_VIEN')">Sinh viên</span>
    </div>
  </div>
  <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
    <i class="fas fa-check-circle me-2"></i><span th:text="${success}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>
  <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
    <i class="fas fa-exclamation-circle me-2"></i><span th:text="${error}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>
  <div th:replace="${content}"></div>
</div>
<script th:src="@{/webjars/bootstrap/5.3.2/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
