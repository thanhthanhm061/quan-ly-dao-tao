<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title>Đăng nhập - QLĐT</title>
  <link th:href="@{/webjars/bootstrap/5.3.2/css/bootstrap.min.css}" rel="stylesheet"/>
  <link th:href="@{/webjars/font-awesome/6.4.2/css/all.min.css}" rel="stylesheet"/>
  <style>
    body { background: linear-gradient(135deg,#1e3a5f 0%,#2563eb 100%); min-height:100vh; display:flex; align-items:center; justify-content:center; }
    .login-card { background:#fff; border-radius:20px; padding:40px; width:100%; max-width:420px; box-shadow:0 20px 60px rgba(0,0,0,.3); }
    .logo-area { text-align:center; margin-bottom:30px; }
    .logo-icon { width:70px; height:70px; background:linear-gradient(135deg,#1e3a5f,#2563eb); border-radius:18px; display:inline-flex; align-items:center; justify-content:center; font-size:2rem; color:#fff; margin-bottom:15px; }
    .form-control { border-radius:10px; padding:12px 16px; border:2px solid #e2e8f0; transition:.2s; }
    .form-control:focus { border-color:#2563eb; box-shadow:0 0 0 3px rgba(37,99,235,.1); }
    .btn-login { background:linear-gradient(135deg,#1e3a5f,#2563eb); border:none; border-radius:10px; padding:12px; font-weight:600; letter-spacing:.5px; }
    .alert { border-radius:10px; border:none; }
    .input-group-text { border-radius:10px 0 0 10px; background:#f8fafc; border:2px solid #e2e8f0; border-right:none; color:#718096; }
    .input-group .form-control { border-radius:0 10px 10px 0; border-left:none; }
    .demo-accounts { background:#f0f7ff; border-radius:10px; padding:12px 15px; font-size:.82rem; }
  </style>
</head>
<body>
<div class="login-card">
  <div class="logo-area">
    <div class="logo-icon"><i class="fas fa-graduation-cap"></i></div>
    <h4 class="fw-bold mb-1">HỆ THỐNG QLĐT</h4>
    <p class="text-muted small">Quản lý và Điều hành Đào tạo</p>
  </div>

  <!-- Error -->
  <div th:if="${param.error}" class="alert alert-danger">
    <i class="fas fa-exclamation-triangle me-2"></i>Tên đăng nhập hoặc mật khẩu không đúng!
  </div>
  <div th:if="${param.logout}" class="alert alert-success">
    <i class="fas fa-check-circle me-2"></i>Đăng xuất thành công!
  </div>

  <form th:action="@{/login}" method="post">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

    <div class="mb-3">
      <label class="form-label fw-600 small">Tên đăng nhập</label>
      <div class="input-group">
        <span class="input-group-text"><i class="fas fa-user"></i></span>
        <input type="text" name="username" class="form-control" placeholder="Nhập username..." required autofocus/>
      </div>
    </div>

    <div class="mb-4">
      <label class="form-label fw-600 small">Mật khẩu</label>
      <div class="input-group">
        <span class="input-group-text"><i class="fas fa-lock"></i></span>
        <input type="password" name="password" id="password" class="form-control" placeholder="Nhập mật khẩu..." required/>
        <button class="btn btn-outline-secondary" type="button" onclick="togglePass()"><i class="fas fa-eye" id="eyeIcon"></i></button>
      </div>
    </div>

    <button type="submit" class="btn btn-login btn-primary w-100 text-white">
      <i class="fas fa-sign-in-alt me-2"></i>Đăng nhập
    </button>
  </form>

  <div class="demo-accounts mt-4">
    <strong><i class="fas fa-info-circle me-1"></i>Tài khoản demo:</strong>
    <div class="mt-2">
      <span class="badge bg-danger me-1">Admin</span> admin / Admin@123<br>
      <span class="badge bg-success me-1">Giảng viên</span> gv001 / Admin@123<br>
      <span class="badge bg-primary me-1">Sinh viên</span> sv001 / Admin@123
    </div>
  </div>
</div>

<script th:src="@{/webjars/bootstrap/5.3.2/js/bootstrap.bundle.min.js}"></script>
<script>
function togglePass() {
  const p = document.getElementById('password');
  const i = document.getElementById('eyeIcon');
  if (p.type === 'password') { p.type = 'text'; i.className = 'fas fa-eye-slash'; }
  else { p.type = 'password'; i.className = 'fas fa-eye'; }
}
</script>
</body>
</html>
